schema_version: "3.1"

project:
  name: "pallets/click"
  repository: "https://github.com/pallets/click"
  branch: "main"
  language: "Python"
  test_framework: "pytest"

targets:

  # ===========================================================================
  # TGT-01: ParamType (基底クラス)
  # ===========================================================================
  - id: "TGT-01"
    file: "src/click/types.py"
    function_signature: "class ParamType"
    class_name: "ParamType"
    responsibility: "パラメータ型の基底。convert protocol と ClassVar 属性を提供"
    code_lines: 131

    branch_conditions:
      - id: "BC-01-01"
        line_hint: "if value is not None"
        condition: "__call__ 内 value 非None"
        true_action: "convert を呼ぶ"
        false_action: "暗黙的に None を返す"
      - id: "BC-01-02"
        line_hint: "if hasattr(self, 'name')"
        condition: "to_info_dict 内 name 属性の有無"
        true_action: "self.name を利用"
        false_action: "param_type を利用"

    class_hierarchy:
      base_classes: []
      derived_classes: ["CompositeParamType", "FuncParamType", "UnprocessedParamType",
                        "StringParamType", "Choice", "DateTime", "_NumberParamTypeBase",
                        "BoolParamType", "UUIDParameterType", "File", "Path"]
      interfaces: []
      is_abstract: false
      overrides: []

    state_variables:
      - id: "SVAR-01-01"
        name: "is_composite"
        type: "ClassVar[bool]"
        visibility: "public"
        initial_value: "False"
        mutable: true
        required_at_construction: false
        declared_immutable: false
        externally_mutated_by: []
      - id: "SVAR-01-02"
        name: "arity"
        type: "ClassVar[int]"
        visibility: "public"
        initial_value: "1"
        mutable: true
        required_at_construction: false
      - id: "SVAR-01-03"
        name: "name"
        type: "str (宣言のみ)"
        visibility: "public"
        initial_value: "なし"
        mutable: true
        required_at_construction: true
        invariant_constraints: ["派生クラスでは必ず設定されていること"]
      - id: "SVAR-01-04"
        name: "envvar_list_splitter"
        type: "ClassVar[str | None]"
        visibility: "public"
        initial_value: "None"
        mutable: true

    code_patterns:
      - id: "CPAT-01-01"
        category: "design_pattern"
        pattern_name: "Template Method (implicit abstract)"
        description: "convert は既定でidentityだが、派生で上書き前提"
        source_locations: ["types.py:102-124"]
        test_implications: "各派生クラスで convert が適切に上書きされていることを検証"
      - id: "CPAT-01-02"
        category: "language_idiom"
        pattern_name: "ClassVar による共有属性"
        description: "is_composite/arity/envvar_list_splitter をClassVar宣言"
        source_locations: ["types.py:48,49,60"]
        test_implications: "インスタンス単位で上書きした場合の挙動を検証"

    accessors:
      - id: "ACC-01-01"
        field_name: "name"
        getter: "属性直接アクセス"
        setter: "属性直接代入"
        is_leaky_getter: false
        is_leaky_setter: false
        returns_internal_ref: false

    construction_contracts:
      - id: "CC-01-01"
        constructor_signature: "ParamType()  (暗黙のdefault __init__)"
        required_fields: []
        optional_fields: ["name", "is_composite", "arity", "envvar_list_splitter"]
        invariants_on_exit: ["ClassVar 既定値が設定済み"]

    encapsulation_risks:
      - id: "ENR-01-01"
        field_name: "name"
        risk_type: "missing_validation"
        severity: "medium"
        detection_site: "types.py:52 (declared without default)"
        description: "派生クラスが name を設定し忘れると、to_info_dict で hasattr 分岐に落ちるが、convert 後の利用箇所で AttributeError"
        suggested_fix: "ABC化して抽象属性として宣言、または __init_subclass__ で検証"

    dependencies:
      calls: ["BadParameter"]
      called_by: ["click.core.Parameter", "すべての派生クラス"]
      globals: []

    test_requirements:
      - id: "BR-01-01"
        type: "branch_coverage"
        description: "__call__(None) が convert を呼ばずに None を返すこと"
        priority: "high"
        source_ref: "BC-01-01 false"
      - id: "BR-01-02"
        type: "branch_coverage"
        description: "__call__(非None値) が convert を呼び出すこと"
        priority: "high"
        source_ref: "BC-01-01 true"
      - id: "BR-01-03"
        type: "branch_coverage"
        description: "to_info_dict で name 属性がある場合に self.name が使われること"
        priority: "medium"
        source_ref: "BC-01-02 true"
      - id: "BR-01-04"
        type: "branch_coverage"
        description: "to_info_dict で name 属性がない場合に param_type が利用されること"
        priority: "medium"
        source_ref: "BC-01-02 false"
      - id: "BR-01-05"
        type: "branch_coverage"
        description: "fail メソッドが BadParameter を確実に投げること"
        priority: "high"
        source_ref: "types.py:143"
      - id: "EC-01-01"
        type: "equivalence_class"
        description: "convert の既定動作が identity（受け取った値をそのまま返す）であること"
        priority: "medium"
        source_ref: "types.py:124"
      - id: "EC-01-02"
        type: "equivalence_class"
        description: "split_envvar_value が None splitter のとき空白分割になること"
        priority: "medium"
        source_ref: "types.py:134"
      - id: "EC-01-03"
        type: "equivalence_class"
        description: "shell_complete の既定が空リストを返すこと"
        priority: "low"
      - id: "ER-01-01"
        type: "error_path"
        description: "fail 呼び出しで BadParameter が例外として伝播すること"
        priority: "high"
      - id: "ER-01-02"
        type: "error_path"
        description: "name 未設定のサブクラスで to_info_dict は AttributeError にならない（hasattr分岐で保護）"
        priority: "medium"
      - id: "DP-01-01"
        type: "dependency_path"
        description: "fail が BadParameter(ctx, param) を正しく構築して投げること"
        priority: "medium"
      - id: "CI-01-01"
        type: "class_inheritance"
        subtype: "polymorphic_dispatch"
        description: "派生クラスのインスタンスに対して __call__ が派生の convert を呼ぶこと"
        priority: "high"
        base_class: "ParamType"
        derived_classes: ["StringParamType", "Choice", "IntParamType"]
      - id: "CI-01-02"
        type: "class_inheritance"
        subtype: "abstract_coverage"
        description: "すべての派生クラスが convert を有意に上書きしていること（identity返しの検出）"
        priority: "medium"
        base_class: "ParamType"
      - id: "CI-01-03"
        type: "class_inheritance"
        subtype: "override_correctness"
        description: "派生クラスの name 属性がクラス特有の値に設定されていること"
        priority: "high"
        base_class: "ParamType"
      - id: "CI-01-04"
        type: "class_inheritance"
        subtype: "interface_contract"
        description: "convert が Parameter=None, Context=None を許容すること（docstring契約）"
        priority: "high"
      - id: "CP-01-01"
        type: "code_pattern"
        subtype: "design_pattern_conformance"
        description: "Template Method パターン: 基底の既定動作と派生の上書きが共存できること"
        priority: "medium"
      - id: "CP-01-02"
        type: "code_pattern"
        subtype: "idiom_correctness"
        description: "ClassVar 宣言された属性をインスタンス単位で上書きした場合、他インスタンスに波及しないこと"
        priority: "medium"
      - id: "EN-01-01"
        type: "encapsulation"
        subtype: "access_control_correctness"
        description: "name, is_composite, arity, envvar_list_splitter は派生で任意に上書きできる public class attribute であること"
        priority: "medium"
        source_ref: "SVAR-01-01〜04"
        target_member: "ClassVar 属性群"
      - id: "EN-01-02"
        type: "encapsulation"
        subtype: "invariant_surface"
        description: "name 未設定のサブクラスでも to_info_dict が例外を投げずに完了すること（hasattr 保護の契約）"
        priority: "high"
        source_ref: "ENR-01-01"
        target_member: "name"

  # ===========================================================================
  # TGT-02: StringParamType
  # ===========================================================================
  - id: "TGT-02"
    file: "src/click/types.py"
    function_signature: "class StringParamType(ParamType)"
    class_name: "StringParamType"
    responsibility: "bytes/str 入力を適切な文字列に変換する"
    code_lines: 24

    branch_conditions:
      - id: "BC-02-01"
        line_hint: "if isinstance(value, bytes)"
        condition: "value が bytes"
        true_action: "デコード処理に進む"
        false_action: "str(value) を返す"
      - id: "BC-02-02"
        line_hint: "except UnicodeError (first)"
        condition: "argv encoding でのデコード失敗"
        true_action: "fs_encoding を試行"
        false_action: "結果を返す"
      - id: "BC-02-03"
        line_hint: "if fs_enc != enc"
        condition: "fs_enc と enc が異なる"
        true_action: "fs_enc で再デコード試行"
        false_action: "直接 utf-8 replace"
      - id: "BC-02-04"
        line_hint: "except UnicodeError (second)"
        condition: "fs_encoding でのデコード失敗"
        true_action: "utf-8 replace で強制デコード"
        false_action: "fs_enc デコード結果を返す"

    class_hierarchy:
      base_classes: ["ParamType"]
      derived_classes: []
      is_override: true
      overrides:
        - base_class: "ParamType"
          base_method: "convert"
          override_behavior: "identity返し → bytes/str の適切処理"
        - base_class: "ParamType"
          base_method: "__repr__"
          override_behavior: "'STRING' を返す"

    state_variables:
      - id: "SVAR-02-01"
        name: "name"
        type: "ClassVar[str]"
        visibility: "public"
        initial_value: '"text"'
        mutable: true
        required_at_construction: false

    accessors: []
    construction_contracts:
      - id: "CC-02-01"
        constructor_signature: "StringParamType()"
        required_fields: []
        optional_fields: []

    encapsulation_risks: []

    code_patterns:
      - id: "CPAT-02-01"
        category: "error_handling"
        pattern_name: "多段フォールバック"
        description: "argv encoding → fs encoding → utf-8 replace の3段デコード"
        source_locations: ["types.py:213-226"]
        test_implications: "各段階の失敗とフォールバック動作を検証"

    dependencies:
      calls: ["_get_argv_encoding", "sys.getfilesystemencoding", "bytes.decode"]
      globals: []

    test_requirements:
      - id: "BR-02-01"
        type: "branch_coverage"
        description: "bytes 入力時に argv encoding でデコードされること"
        priority: "high"
        source_ref: "BC-02-01 true"
      - id: "BR-02-02"
        type: "branch_coverage"
        description: "非bytes入力時に str(value) が返されること"
        priority: "high"
        source_ref: "BC-02-01 false"
      - id: "BR-02-03"
        type: "branch_coverage"
        description: "argv encoding 失敗時に fs encoding にフォールバックすること"
        priority: "high"
        source_ref: "BC-02-02 true"
      - id: "BR-02-04"
        type: "branch_coverage"
        description: "fs_enc == enc の場合に直接 utf-8 replace へ進むこと"
        priority: "medium"
        source_ref: "BC-02-03 false"
      - id: "BR-02-05"
        type: "branch_coverage"
        description: "fs_enc デコードも失敗した場合に utf-8 replace で強制デコードされること"
        priority: "medium"
        source_ref: "BC-02-04 true"
      - id: "BR-02-06"
        type: "branch_coverage"
        description: "正常な argv encoding でのデコード成功時に即座に値が返されること"
        priority: "high"
        source_ref: "BC-02-02 false"
      - id: "BR-02-07"
        type: "branch_coverage"
        description: "__repr__ が 'STRING' を返すこと"
        priority: "low"
      - id: "BR-02-08"
        type: "branch_coverage"
        description: "convert に None が渡らないこと（__call__経由）"
        priority: "high"
      - id: "EC-02-01"
        type: "equivalence_class"
        description: "bytes / str / int / float 各型の入力で期待通り変換されること"
        priority: "high"
      - id: "EC-02-02"
        type: "equivalence_class"
        description: "ASCII 可能な bytes と UTF-8 特殊文字含む bytes の両方を扱えること"
        priority: "medium"
      - id: "EC-02-03"
        type: "equivalence_class"
        description: "argv encoding と fs encoding が同一の場合と異なる場合"
        priority: "medium"
      - id: "BV-02-01"
        type: "boundary_value"
        description: "空の bytes b'' と空文字列 '' でクラッシュしないこと"
        priority: "medium"
      - id: "ER-02-01"
        type: "error_path"
        description: "全エンコーディングで失敗しても utf-8 replace で何らかの str を返すこと（例外にしない）"
        priority: "high"
      - id: "CI-02-01"
        type: "class_inheritance"
        subtype: "override_correctness"
        description: "ParamType.convert と StringParamType.convert で bytes 入力時の結果が異なること"
        priority: "high"
        base_class: "ParamType"
      - id: "CI-02-02"
        type: "class_inheritance"
        subtype: "liskov_substitution"
        description: "ParamType 型の変数として StringParamType を使っても contract を破らないこと"
        priority: "medium"
      - id: "CP-02-01"
        type: "code_pattern"
        subtype: "idiom_correctness"
        description: "多段エンコーディングフォールバックがどの順序でも完了すること"
        priority: "medium"
      - id: "EN-02-01"
        type: "encapsulation"
        subtype: "mutability_contract"
        description: "name ClassVar は実行時に変更しても同クラスの他インスタンスへ波及しないこと"
        priority: "low"
        source_ref: "SVAR-02-01"
        target_member: "name"

  # ===========================================================================
  # TGT-03: Choice (stateful OOP の中心)
  # ===========================================================================
  - id: "TGT-03"
    file: "src/click/types.py"
    function_signature: "class Choice(ParamType, Generic[ParamTypeValue])"
    class_name: "Choice"
    responsibility: "候補値集合に対する入力検証と正規化"
    code_lines: 165

    branch_conditions:
      - id: "BC-03-01"
        line_hint: "isinstance(choice, enum.Enum)"
        condition: "choice が Enum 型"
        true_action: "choice.name を使用"
        false_action: "str(choice) を使用"
      - id: "BC-03-02"
        line_hint: "ctx is not None and ctx.token_normalize_func is not None"
        condition: "ctx の token_normalize_func が利用可能"
        true_action: "token_normalize_func を適用"
        false_action: "スキップ"
      - id: "BC-03-03"
        line_hint: "if not self.case_sensitive"
        condition: "case insensitive モード"
        true_action: "casefold を適用"
        false_action: "スキップ"
      - id: "BC-03-04"
        line_hint: "if param.param_type_name == 'option' and not param.show_choices"
        condition: "option 指定で show_choices=False"
        true_action: "型名メタバー生成"
        false_action: "値の normalized 列挙"
      - id: "BC-03-05"
        line_hint: "if param.required and param.param_type_name == 'argument'"
        condition: "required argument"
        true_action: "{} 括弧"
        false_action: "[] 括弧"
      - id: "BC-03-06"
        line_hint: "try/except StopIteration in convert"
        condition: "normalized_mapping から一致値が見つからない"
        true_action: "fail を呼ぶ"
        false_action: "マッチする original を返す"

    class_hierarchy:
      base_classes: ["ParamType", "Generic[ParamTypeValue]"]
      derived_classes: []
      is_override: true
      overrides:
        - base_class: "ParamType"
          base_method: "to_info_dict"
          override_behavior: "super().to_info_dict() + choices/case_sensitive追加"
        - base_class: "ParamType"
          base_method: "convert"
          override_behavior: "normalize → mapping検索 → fail"
        - base_class: "ParamType"
          base_method: "get_metavar"
          override_behavior: "option/argument 分岐で括弧切替"
        - base_class: "ParamType"
          base_method: "get_missing_message"
          override_behavior: "gettext で翻訳メッセージ"
        - base_class: "ParamType"
          base_method: "shell_complete"
          override_behavior: "choices との前方一致"

    inheritance_conditions:
      - id: "IC-03-01"
        type: "super_delegation"
        base_class: "ParamType"
        derived_class: "Choice"
        condition: "to_info_dict で super() 呼び出し後に独自キーを追加"
        expected_behavior: "基底の param_type/name に加えて choices/case_sensitive が含まれる"

    state_variables:
      - id: "SVAR-03-01"
        name: "choices"
        type: "Sequence[ParamTypeValue]"
        visibility: "public"
        initial_value: "tuple(input) で __init__ 時に設定"
        mutable: true
        required_at_construction: true
        declared_immutable: false
        externally_mutated_by: []
        invariant_constraints: ["要素数 >= 1 であるべき（空では機能しない）", "各要素は unique な normalized 値を持つべき"]
      - id: "SVAR-03-02"
        name: "case_sensitive"
        type: "bool"
        visibility: "public"
        initial_value: "True"
        mutable: true
        required_at_construction: false
      - id: "SVAR-03-03"
        name: "name"
        type: "ClassVar[str]"
        visibility: "public"
        initial_value: '"choice"'
        mutable: true

    accessors:
      - id: "ACC-03-01"
        field_name: "choices"
        getter: "self.choices 直接アクセス"
        setter: "self.choices = ... 直接代入"
        is_leaky_getter: true
        is_leaky_setter: true
        returns_internal_ref: true
      - id: "ACC-03-02"
        field_name: "case_sensitive"
        getter: "直接"
        setter: "直接"
        is_leaky_getter: false
        is_leaky_setter: true

    construction_contracts:
      - id: "CC-03-01"
        constructor_signature: "__init__(choices: Iterable[T], case_sensitive: bool = True)"
        required_fields: ["choices"]
        optional_fields: ["case_sensitive"]
        invariants_on_exit: ["self.choices は tuple 型", "self.case_sensitive は bool"]

    encapsulation_risks:
      - id: "ENR-03-01"
        field_name: "choices"
        risk_type: "unintended_mutability"
        severity: "medium"
        detection_site: "types.py:261"
        description: "choices は tuple化されるが public で再代入可能。生存期間中に差し替えると normalize/convert の結果が変わる"
        suggested_fix: "frozen dataclass 化 または property+underlying _choices で setter を禁止"
      - id: "ENR-03-02"
        field_name: "choices"
        risk_type: "leaky_getter"
        severity: "low"
        detection_site: "types.py:261 (tuple は不変だが、内部要素への参照漏洩)"
        description: "tuple自体は不変だが、要素がmutable（list/dict）の場合、要素経由で状態が変わる可能性"
      - id: "ENR-03-03"
        field_name: "case_sensitive"
        risk_type: "external_mutation"
        severity: "medium"
        detection_site: "types.py:262"
        description: "case_sensitive を生存期間中に変更すると過去の normalized 結果と矛盾する"

    code_patterns:
      - id: "CPAT-03-01"
        category: "design_pattern"
        pattern_name: "Generic Type Parameter"
        description: "Generic[ParamTypeValue] でchoice型を外部指定"
        source_locations: ["types.py:233"]
        test_implications: "異なる型のchoiceで正しく動作すること"
      - id: "CPAT-03-02"
        category: "language_idiom"
        pattern_name: "gettext 国際化"
        description: "get_missing_message/get_invalid_choice_message で _() / ngettext"
        source_locations: ["types.py:332,368"]
        test_implications: "翻訳 catalog 切替でメッセージが切り替わること"

    dependencies:
      calls: ["enum.Enum", "str.casefold", "ctx.token_normalize_func", "self.fail"]

    test_requirements:
      - id: "BR-03-01"
        type: "branch_coverage"
        description: "Enum 型 choice が choice.name で正規化されること"
        priority: "high"
        source_ref: "BC-03-01 true"
      - id: "BR-03-02"
        type: "branch_coverage"
        description: "非Enum の choice が str(choice) で正規化されること"
        priority: "high"
        source_ref: "BC-03-01 false"
      - id: "BR-03-03"
        type: "branch_coverage"
        description: "ctx.token_normalize_func が設定されているとき適用されること"
        priority: "medium"
        source_ref: "BC-03-02 true"
      - id: "BR-03-04"
        type: "branch_coverage"
        description: "ctx が None または token_normalize_func 未設定でスキップされること"
        priority: "medium"
        source_ref: "BC-03-02 false"
      - id: "BR-03-05"
        type: "branch_coverage"
        description: "case_sensitive=False のとき casefold が適用されること"
        priority: "high"
        source_ref: "BC-03-03 true"
      - id: "BR-03-06"
        type: "branch_coverage"
        description: "case_sensitive=True のとき casefold が適用されないこと"
        priority: "high"
        source_ref: "BC-03-03 false"
      - id: "BR-03-07"
        type: "branch_coverage"
        description: "option + show_choices=False のメタバー分岐"
        priority: "medium"
        source_ref: "BC-03-04 true"
      - id: "BR-03-08"
        type: "branch_coverage"
