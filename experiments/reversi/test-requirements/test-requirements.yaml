# =============================================================================
# リバーシサンプル TRM（パイプライン生成相当）
# =============================================================================
# 生成日: 2026-04-21
# 準拠: templates/trm-schema.yaml v3.0
# 導出ルール: .claude/commands/generate-trm.md
# 目的: survey-design.md §5.3 の手書き9要求との一致度検証
# =============================================================================

schema_version: "3.0"

project:
  name: "reversi-sample"
  repository: "local://experiments/reversi"
  branch: "main"
  language: "Python"
  test_framework: "pytest"

targets:

  # ===========================================================================
  # TGT-01: is_on_board(x, y) -> bool
  # ===========================================================================
  - id: "TGT-01"
    file: "experiments/reversi/reversi_move.py"
    function_signature: "is_on_board(x: int, y: int) -> bool"
    class_name: ""
    responsibility: "座標 (x, y) が 8×8 盤面の範囲内かを判定する"
    code_lines: 3
    preconditions:
      - "BOARD_SIZE == 8"
    constraints: []

    branch_conditions:
      - id: "BC-01-01"
        line_hint: "0 <= x"
        condition: "x が 0 以上"
        true_action: "次原子へ進む"
        false_action: "False を返す"
      - id: "BC-01-02"
        line_hint: "x < BOARD_SIZE"
        condition: "x が BOARD_SIZE 未満"
        true_action: "次原子へ進む"
        false_action: "False を返す"
      - id: "BC-01-03"
        line_hint: "0 <= y"
        condition: "y が 0 以上"
        true_action: "次原子へ進む"
        false_action: "False を返す"
      - id: "BC-01-04"
        line_hint: "y < BOARD_SIZE"
        condition: "y が BOARD_SIZE 未満"
        true_action: "True を返す"
        false_action: "False を返す"

    equivalence_classes:
      - id: "EQ-01-01"
        parameter: "x"
        class_name: "範囲外（負）"
        representative: "-1"
        description: "x < 0"
      - id: "EQ-01-02"
        parameter: "x"
        class_name: "範囲内"
        representative: "3"
        description: "0 <= x < BOARD_SIZE"
      - id: "EQ-01-03"
        parameter: "x"
        class_name: "範囲外（正）"
        representative: "8"
        description: "x >= BOARD_SIZE"
      - id: "EQ-01-04"
        parameter: "y"
        class_name: "範囲外（負）"
        representative: "-1"
        description: "y < 0"
      - id: "EQ-01-05"
        parameter: "y"
        class_name: "範囲内"
        representative: "3"
        description: "0 <= y < BOARD_SIZE"
      - id: "EQ-01-06"
        parameter: "y"
        class_name: "範囲外（正）"
        representative: "8"
        description: "y >= BOARD_SIZE"

    boundary_values:
      - id: "BND-01-01"
        parameter: "x"
        boundary: "下限"
        on_value: "0"
        off_value: "-1"
      - id: "BND-01-02"
        parameter: "x"
        boundary: "上限"
        on_value: "7"
        off_value: "8"
      - id: "BND-01-03"
        parameter: "y"
        boundary: "下限"
        on_value: "0"
        off_value: "-1"
      - id: "BND-01-04"
        parameter: "y"
        boundary: "上限"
        on_value: "7"
        off_value: "8"

    dependencies:
      calls: []
      called_by: ["count_flippable", "is_valid_move"]
      globals: ["BOARD_SIZE"]
    stub_strategy: "スタブ不要"

    test_requirements:
      - id: "BR-01-01"
        type: "branch_coverage"
        description: "全原子条件が真のとき True を返すことを検証する"
        priority: "high"
        source_ref: "BC-01-01〜04 の全真"
        expected_behavior: "is_on_board(3, 3) == True"
        test_data:
          input: "x=3, y=3"
          expected_output: "True"
      - id: "BR-01-02"
        type: "branch_coverage"
        description: "x が負のとき False を返すこと（下限違反）"
        priority: "high"
        source_ref: "BC-01-01"
        expected_behavior: "is_on_board(-1, 3) == False"
      - id: "BR-01-03"
        type: "branch_coverage"
        description: "x が BOARD_SIZE 以上のとき False を返すこと（上限違反）"
        priority: "high"
        source_ref: "BC-01-02"
        expected_behavior: "is_on_board(8, 3) == False"
      - id: "BR-01-04"
        type: "branch_coverage"
        description: "y が負のとき False を返すこと"
        priority: "high"
        source_ref: "BC-01-03"
        expected_behavior: "is_on_board(3, -1) == False"
      - id: "BR-01-05"
        type: "branch_coverage"
        description: "y が BOARD_SIZE 以上のとき False を返すこと"
        priority: "high"
        source_ref: "BC-01-04"
        expected_behavior: "is_on_board(3, 8) == False"
      - id: "EC-01-01"
        type: "equivalence_class"
        description: "x が範囲内の代表値（3）で True"
        priority: "medium"
        source_ref: "EQ-01-02"
      - id: "BV-01-01"
        type: "boundary_value"
        description: "x の下限境界 0 / -1 で判定が正しく切り替わること"
        priority: "high"
        source_ref: "BND-01-01"
      - id: "BV-01-02"
        type: "boundary_value"
        description: "x の上限境界 7 / 8 で判定が正しく切り替わること"
        priority: "high"
        source_ref: "BND-01-02"
      - id: "BV-01-03"
        type: "boundary_value"
        description: "y の下限境界 0 / -1 で判定が正しく切り替わること"
        priority: "high"
        source_ref: "BND-01-03"
      - id: "BV-01-04"
        type: "boundary_value"
        description: "y の上限境界 7 / 8 で判定が正しく切り替わること"
        priority: "high"
        source_ref: "BND-01-04"

  # ===========================================================================
  # TGT-02: is_empty(board, x, y) -> bool
  # ===========================================================================
  - id: "TGT-02"
    file: "experiments/reversi/reversi_move.py"
    function_signature: "is_empty(board, x: int, y: int) -> bool"
    class_name: ""
    responsibility: "指定マスが空（値=0）かを判定する"
    code_lines: 3
    preconditions:
      - "board が 8x8 の二次元配列であること"
      - "x, y が盤面の範囲内であること（呼び出し側で保証）"
    constraints: []

    branch_conditions:
      - id: "BC-02-01"
        line_hint: "board[x][y] == 0"
        condition: "対象マスの値が 0"
        true_action: "True を返す"
        false_action: "False を返す"

    equivalence_classes:
      - id: "EQ-02-01"
        parameter: "board[x][y]"
        class_name: "空"
        representative: "0"
        description: "空マス"
      - id: "EQ-02-02"
        parameter: "board[x][y]"
        class_name: "自分の石"
        representative: "1"
        description: "自分の石が置かれている"
      - id: "EQ-02-03"
        parameter: "board[x][y]"
        class_name: "相手の石"
        representative: "2"
        description: "相手の石が置かれている"

    boundary_values: []

    dependencies:
      calls: []
      called_by: ["is_valid_move"]
      globals: []
    stub_strategy: "スタブ不要"

    test_requirements:
      - id: "BR-02-01"
        type: "branch_coverage"
        description: "空マス（値=0）で True を返すこと"
        priority: "high"
        source_ref: "BC-02-01 true"
        expected_behavior: "board[x][y]=0 のとき True"
      - id: "BR-02-02"
        type: "branch_coverage"
        description: "非空マス（値≠0）で False を返すこと"
        priority: "high"
        source_ref: "BC-02-01 false"
        expected_behavior: "board[x][y]≠0 のとき False"
      - id: "EC-02-01"
        type: "equivalence_class"
        description: "自分の石が置かれたマスは非空"
        priority: "medium"
        source_ref: "EQ-02-02"
      - id: "EC-02-02"
        type: "equivalence_class"
        description: "相手の石が置かれたマスは非空"
        priority: "medium"
        source_ref: "EQ-02-03"
      - id: "ER-02-01"
        type: "error_path"
        description: "前提違反（x, y が範囲外）で IndexError を発生させることを観察する"
        priority: "low"
        source_ref: "前提契約"
        expected_behavior: "仕様外の呼び出しは例外"

  # ===========================================================================
  # TGT-03: count_flippable(board, x, y, dx, dy, me) -> int
  # ===========================================================================
  - id: "TGT-03"
    file: "experiments/reversi/reversi_move.py"
    function_signature: "count_flippable(board, x, y, dx, dy, me) -> int"
    class_name: ""
    responsibility: "(x, y) から (dx, dy) 方向に、自分の石で挟める相手の石の数を返す"
    code_lines: 15
    preconditions:
      - "(x, y) は盤面内"
      - "(dx, dy) ∈ DIRECTIONS"
      - "me ∈ {1, 2}"
    constraints: []

    branch_conditions:
      - id: "BC-03-01"
        line_hint: "opp = 2 if me == 1 else 1"
        condition: "三項演算子: me == 1"
        true_action: "opp = 2"
        false_action: "opp = 1"
      - id: "BC-03-02"
        line_hint: "while is_on_board(nx, ny) and board[nx][ny] == opp"
        condition: "盤面内かつ相手の石"
        true_action: "ループ継続"
        false_action: "ループ終了"
      - id: "BC-03-03"
        line_hint: "if count == 0 or ..."
        condition: "最終ガード第1条件: count == 0"
        true_action: "0 を返す"
        false_action: "次原子へ"
      - id: "BC-03-04"
        line_hint: "or not is_on_board(nx, ny)"
        condition: "最終ガード第2条件: 盤端で途切れ"
        true_action: "0 を返す"
        false_action: "次原子へ"
      - id: "BC-03-05"
        line_hint: "or board[nx][ny] != me"
        condition: "最終ガード第3条件: 自分の石で閉じていない"
        true_action: "0 を返す"
        false_action: "count を返す"

    equivalence_classes:
      - id: "EQ-03-01"
        parameter: "me"
        class_name: "自分=1"
        representative: "1"
        description: "opp = 2"
      - id: "EQ-03-02"
        parameter: "me"
        class_name: "自分=2"
        representative: "2"
        description: "opp = 1"
      - id: "EQ-03-03"
        parameter: "連続相手石数"
        class_name: "ゼロ"
        representative: "0"
        description: "方向先がすぐ相手以外"
      - id: "EQ-03-04"
        parameter: "連続相手石数"
        class_name: "1個"
        representative: "1"
        description: "相手1個の後に自分の石"
      - id: "EQ-03-05"
        parameter: "連続相手石数"
        class_name: "複数"
        representative: "2〜6"
        description: "複数挟める"
      - id: "EQ-03-06"
        parameter: "方向分類"
        class_name: "軸方向"
        representative: "(0,1),(1,0),(-1,0),(0,-1)"
        description: "上下左右"
      - id: "EQ-03-07"
        parameter: "方向分類"
        class_name: "対角方向"
        representative: "(1,1),(-1,-1),(1,-1),(-1,1)"
        description: "4対角"

    boundary_values:
      - id: "BND-03-01"
        parameter: "連続相手石数"
        boundary: "0 と 1 の境界"
        on_value: "0"
        off_value: "1"
      - id: "BND-03-02"
        parameter: "連続相手石数"
        boundary: "最大連続（盤端に達する）"
        on_value: "6"
        off_value: "7"

    dependencies:
      calls: ["is_on_board"]
      called_by: ["is_valid_move"]
      globals: []
    stub_strategy: "is_on_board は同モジュール内関数のため統合テスト"

    test_requirements:
      - id: "BR-03-01"
        type: "branch_coverage"
        description: "me == 1 のとき opp = 2 になり、値 2 の石を数えること"
        priority: "high"
        source_ref: "BC-03-01 true"
      - id: "BR-03-02"
        type: "branch_coverage"
        description: "me != 1 のとき opp = 1 になり、値 1 の石を数えること"
        priority: "high"
        source_ref: "BC-03-01 false"
      - id: "BR-03-03"
        type: "branch_coverage"
        description: "盤面内かつ相手の石が続く間、ループが継続すること"
        priority: "high"
        source_ref: "BC-03-02 true"
      - id: "BR-03-04"
        type: "branch_coverage"
        description: "盤端でループが終了すること"
        priority: "high"
        source_ref: "BC-03-02 false (is_on_board)"
      - id: "BR-03-05"
        type: "branch_coverage"
        description: "非相手マスでループが終了すること"
        priority: "high"
        source_ref: "BC-03-02 false (board[nx][ny] != opp)"
      - id: "BR-03-06"
        type: "branch_coverage"
        description: "相手石が 1 つもない場合（count == 0）で 0 を返すこと"
        priority: "high"
        source_ref: "BC-03-03 true"
      - id: "BR-03-07"
        type: "branch_coverage"
        description: "相手石列が盤端で途切れた場合に 0 を返すこと"
        priority: "high"
        source_ref: "BC-03-04 true"
      - id: "BR-03-08"
        type: "branch_coverage"
        description: "相手石列の後が自分の石でない場合に 0 を返すこと"
        priority: "high"
        source_ref: "BC-03-05 true"
      - id: "BR-03-09"
        type: "branch_coverage"
        description: "相手石列の後が自分の石のとき count を返すこと"
        priority: "high"
        source_ref: "BC-03-05 false"
      - id: "EC-03-01"
        type: "equivalence_class"
        description: "me=1 と me=2 の両方で対称に動作すること"
        priority: "medium"
        source_ref: "EQ-03-01, EQ-03-02"
      - id: "EC-03-02"
        type: "equivalence_class"
        description: "8方向すべてで挟み判定が機能すること（軸4 + 対角4）"
        priority: "medium"
        source_ref: "EQ-03-06, EQ-03-07"
      - id: "BV-03-01"
        type: "boundary_value"
        description: "連続相手石数 0/1 の境界で返り値が切り替わること"
        priority: "high"
        source_ref: "BND-03-01"
      - id: "BV-03-02"
        type: "boundary_value"
        description: "盤端で連続が途切れる境界（連続6と7）で正しく 0 を返すこと"
        priority: "medium"
        source_ref: "BND-03-02"
      - id: "ER-03-01"
        type: "error_path"
        description: "起点 (x, y) から方向先がすぐ盤外のとき 0 を返すこと"
        priority: "medium"
        source_ref: "最終ガード BC-03-04"
      - id: "DP-03-01"
        type: "dependency_path"
        description: "is_on_board が依存関数として正しく利用されること（スタブ化は不要）"
        priority: "low"
        source_ref: "dependencies.calls"

  # ===========================================================================
  # TGT-04: is_valid_move(board, x, y, me) -> bool
  # ===========================================================================
  - id: "TGT-04"
    file: "experiments/reversi/reversi_move.py"
    function_signature: "is_valid_move(board, x, y, me) -> bool"
    class_name: ""
    responsibility: "(x, y) に自分(me) の石を置けるかを判定する"
    code_lines: 19
    preconditions:
      - "board が 8x8 の二次元配列"
      - "me ∈ {1, 2}"
    constraints: []

    branch_conditions:
      - id: "BC-04-01"
        line_hint: "if not is_on_board(x, y): return False"
        condition: "範囲外"
        true_action: "False を返す"
        false_action: "次のガードへ"
      - id: "BC-04-02"
        line_hint: "if not is_empty(board, x, y): return False"
        condition: "非空"
        true_action: "False を返す"
        false_action: "for ループへ"
      - id: "BC-04-03"
        line_hint: "if count_flippable(board, x, y, dx, dy, me) > 0: return True"
        condition: "少なくとも1方向で挟めるか"
        true_action: "True を返す（早期終了）"
        false_action: "次方向へ"
      - id: "BC-04-04"
        line_hint: "return False (ループ脱出後)"
        condition: "8方向すべて挟めなかった"
        true_action: "False を返す"
        false_action: "N/A"

    equivalence_classes:
      - id: "EQ-04-01"
        parameter: "(x, y)"
        class_name: "範囲内"
        representative: "(3,3)"
        description: "盤面内"
      - id: "EQ-04-02"
        parameter: "(x, y)"
        class_name: "範囲外"
        representative: "(-1,0)"
        description: "盤面外"
      - id: "EQ-04-03"
        parameter: "対象マス状態"
        class_name: "空"
        representative: "0"
        description: "合法手の候補"
      - id: "EQ-04-04"
        parameter: "対象マス状態"
        class_name: "自分の石"
        representative: "1"
        description: "既に自分が置いている"
      - id: "EQ-04-05"
        parameter: "対象マス状態"
        class_name: "相手の石"
        representative: "2"
        description: "既に相手が置いている"
      - id: "EQ-04-06"
        parameter: "挟める方向数"
        class_name: "0個"
        representative: "0"
        description: "どの方向でも挟めない"
      - id: "EQ-04-07"
        parameter: "挟める方向数"
        class_name: "1個以上"
        representative: "1〜8"
        description: "少なくとも1方向"

    boundary_values:
      - id: "BND-04-01"
        parameter: "(x, y)"
        boundary: "盤面の四隅"
        on_value: "(0,0), (0,7), (7,0), (7,7)"
        off_value: "(-1,0), (8,0) 等"
      - id: "BND-04-02"
        parameter: "(x, y)"
        boundary: "盤面の辺"
        on_value: "(0,3), (7,3), (3,0), (3,7)"
        off_value: "(-1,3) 等"

    dependencies:
      calls: ["is_on_board", "is_empty", "count_flippable"]
      called_by: []
      globals: ["DIRECTIONS"]
    stub_strategy: "同モジュール内関数のため統合テスト"

    test_requirements:
      - id: "BR-04-01"
        type: "branch_coverage"
        description: "範囲外の (x, y) で即座に False を返すこと"
        priority: "high"
        source_ref: "BC-04-01 true"
        expected_behavior: "is_valid_move(board, -1, 0, 1) == False"
      - id: "BR-04-02"
        type: "branch_coverage"
        description: "非空マスに対して False を返すこと"
        priority: "high"
        source_ref: "BC-04-02 true"
      - id: "BR-04-03"
        type: "branch_coverage"
        description: "空マスかつ1方向以上で挟める場合に True を返すこと"
        priority: "high"
        source_ref: "BC-04-03 true"
      - id: "BR-04-04"
        type: "branch_coverage"
        description: "空マスだが8方向すべて挟めない場合に False を返すこと"
        priority: "high"
        source_ref: "BC-04-04"
      - id: "EC-04-01"
        type: "equivalence_class"
        description: "対象マスの3状態（空/自分/相手）を網羅して判定が正しく切り替わること"
        priority: "high"
        source_ref: "EQ-04-03〜05"
      - id: "EC-04-02"
        type: "equivalence_class"
        description: "自分/相手（me=1, me=2）の両視点で対称に動作すること"
        priority: "medium"
        source_ref: "対称性"
      - id: "EC-04-03"
        type: "equivalence_class"
        description: "挟める方向が 0 個と 1 個以上 の両条件を網羅すること"
        priority: "high"
        source_ref: "EQ-04-06, EQ-04-07"
      - id: "BV-04-01"
        type: "boundary_value"
        description: "盤面の四隅（角）で正しく合法/非合法が判定されること"
        priority: "high"
        source_ref: "BND-04-01"
      - id: "BV-04-02"
        type: "boundary_value"
        description: "盤面の辺で正しく合法/非合法が判定されること"
        priority: "high"
        source_ref: "BND-04-02"
      - id: "BV-04-03"
        type: "boundary_value"
        description: "x の範囲外直前直後（-1, 0, 7, 8）で判定が切り替わること"
        priority: "medium"
        source_ref: "BND-04-01"
      - id: "ER-04-01"
        type: "error_path"
        description: "範囲外入力でクラッシュせず False を返すこと"
        priority: "high"
        source_ref: "BC-04-01"
      - id: "ER-04-02"
        type: "error_path"
        description: "空盤面で全マスが False を返すこと（置ける場所がない）"
        priority: "medium"
        source_ref: "count_flippable は常に 0"
      - id: "ER-04-03"
        type: "error_path"
        description: "満盤で全マスが False を返すこと（空マスがない）"
        priority: "low"
        source_ref: "BC-04-02 true"
      - id: "DP-04-01"
        type: "dependency_path"
        description: "is_on_board が False を返した時点で以降の呼び出しをスキップすること（短絡評価）"
