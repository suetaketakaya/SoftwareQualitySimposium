# =============================================================================
# ホワイトボックステスト要求モデル
# 対象: sakura-editor/sakura
# 生成日: 2026-03-31
# 目的: SQiP 2026 実証実験 - 静的解析とLLMを組み合わせたテスト要求モデル生成
# =============================================================================

schema_version: "1.0"
project:
  name: "sakura-editor/sakura"
  repository: "https://github.com/sakura-editor/sakura"
  branch: "master"
  language: "C++"
  test_framework: "Google Test"

# テスト要求ID体系:
#   BR-xx: 分岐網羅 (Branch Coverage)
#   EC-xx: 同値クラス (Equivalence Class)
#   BV-xx: 境界値 (Boundary Value)
#   ER-xx: エラーパス (Error Path)
#   DP-xx: 依存切替 (Dependency Path)

# =============================================================================
# 領域1（主実験）: sakura_core/util/format.cpp
# =============================================================================

targets:

  # ---------------------------------------------------------------------------
  # TGT-01: GetDateTimeFormat
  # ---------------------------------------------------------------------------
  - id: "TGT-01"
    file: "sakura_core/util/format.cpp"
    header: "sakura_core/util/format.h"
    function_signature: "std::wstring GetDateTimeFormat(std::wstring_view format, const SYSTEMTIME& systime)"
    responsibility: >
      書式文字列に従いSYSTEMTIME構造体の日時情報を文字列に変換する。
      書式指定子 %Y, %y, %m, %d, %H, %M, %S を認識し、対応する日時フィールドで置換する。
    preconditions:
      - "format は有効な std::wstring_view であること"
      - "systime は有効な SYSTEMTIME 構造体であること（値域チェックは関数側では行わない）"
    constraints:
      - "書式指定子以外の文字はそのまま出力される"
      - "% の後に未知の文字が来た場合、その文字がそのまま出力される"
      - "format 中に null 文字 (L'\\0') が含まれる場合、そこで処理を打ち切る"

    branch_conditions:
      - id: "BC-01-01"
        line_hint: "if( f == L'Y' )"
        condition: "書式指定子が %Y（西暦4桁以上）"
        true_action: "systime.wYear を %d で書式化（桁数制限なし）"
        false_action: "次の条件へ"
      - id: "BC-01-02"
        line_hint: "else if( f == L'y' )"
        condition: "書式指定子が %y（西暦下2桁）"
        true_action: "systime.wYear % 100 を %02d で書式化"
        false_action: "次の条件へ"
      - id: "BC-01-03"
        line_hint: "else if( f == L'm' )"
        condition: "書式指定子が %m（月）"
        true_action: "systime.wMonth を %02d で書式化"
        false_action: "次の条件へ"
      - id: "BC-01-04"
        line_hint: "else if( f == L'd' )"
        condition: "書式指定子が %d（日）"
        true_action: "systime.wDay を %02d で書式化"
        false_action: "次の条件へ"
      - id: "BC-01-05"
        line_hint: "else if( f == L'H' )"
        condition: "書式指定子が %H（時）"
        true_action: "systime.wHour を %02d で書式化"
        false_action: "次の条件へ"
      - id: "BC-01-06"
        line_hint: "else if( f == L'M' )"
        condition: "書式指定子が %M（分）"
        true_action: "systime.wMinute を %02d で書式化"
        false_action: "次の条件へ"
      - id: "BC-01-07"
        line_hint: "else if( f == L'S' )"
        condition: "書式指定子が %S（秒）"
        true_action: "systime.wSecond を %02d で書式化"
        false_action: "不明な指定子として文字をそのまま出力"
      - id: "BC-01-08"
        line_hint: "else{ swprintf( str, ..., L\"%c\", f ); }"
        condition: "% の後に認識されない文字"
        true_action: "その文字をそのまま出力"
      - id: "BC-01-09"
        line_hint: "else if( f == L'%' )"
        condition: "文字が % である"
        true_action: "inSpecifier フラグを true にして次のループへ"
        false_action: "次の条件へ"
      - id: "BC-01-10"
        line_hint: "else if( f == L'\\0' )"
        condition: "文字が null 文字"
        true_action: "ループを break で抜ける"
        false_action: "通常文字としてそのまま出力"

    equivalence_classes:
      - id: "EC-01-01"
        parameter: "format"
        class_name: "空文字列"
        representative: "L\"\""
        expected: "空文字列が返る"
      - id: "EC-01-02"
        parameter: "format"
        class_name: "書式指定子なし（リテラル文字列のみ）"
        representative: "L\"hello world\""
        expected: "入力文字列がそのまま返る"
      - id: "EC-01-03"
        parameter: "format"
        class_name: "%Y 指定子を含む"
        representative: "L\"%Y\""
        expected: "西暦年（桁数制限なし）が出力される"
      - id: "EC-01-04"
        parameter: "format"
        class_name: "%y 指定子を含む"
        representative: "L\"%y\""
        expected: "西暦年下2桁（0パディング）が出力される"
      - id: "EC-01-05"
        parameter: "format"
        class_name: "%m 指定子を含む"
        representative: "L\"%m\""
        expected: "月（2桁0パディング）が出力される"
      - id: "EC-01-06"
        parameter: "format"
        class_name: "%d 指定子を含む"
        representative: "L\"%d\""
        expected: "日（2桁0パディング）が出力される"
      - id: "EC-01-07"
        parameter: "format"
        class_name: "%H 指定子を含む"
        representative: "L\"%H\""
        expected: "時（2桁0パディング）が出力される"
      - id: "EC-01-08"
        parameter: "format"
        class_name: "%M 指定子を含む"
        representative: "L\"%M\""
        expected: "分（2桁0パディング）が出力される"
      - id: "EC-01-09"
        parameter: "format"
        class_name: "%S 指定子を含む"
        representative: "L\"%S\""
        expected: "秒（2桁0パディング）が出力される"
      - id: "EC-01-10"
        parameter: "format"
        class_name: "未知の指定子 %X"
        representative: "L\"%X\""
        expected: "X がそのまま出力される"
      - id: "EC-01-11"
        parameter: "format"
        class_name: "%% (パーセントのエスケープ)"
        representative: "L\"%%\""
        expected: "% が出力される"
      - id: "EC-01-12"
        parameter: "format"
        class_name: "null 文字を中間に含む"
        representative: "L\"%Y\\0%m\" (wstring_view で長さ指定)"
        expected: "null 文字の手前までが処理される"
      - id: "EC-01-13"
        parameter: "format"
        class_name: "複数の指定子を組み合わせた複合書式"
        representative: "L\"%Y-%m-%d %H:%M:%S\""
        expected: "各指定子が対応する値で置換される"
      - id: "EC-01-14"
        parameter: "systime"
        class_name: "全フィールドがゼロ"
        representative: "SYSTEMTIME{0}"
        expected: "年=0, 月=00, 日=00, 時=00, 分=00, 秒=00"
      - id: "EC-01-15"
        parameter: "format"
        class_name: "末尾が % で終わる書式"
        representative: "L\"test%\""
        expected: "inSpecifier=trueのままループ終了。%の後に文字がないため書式展開されない"

    boundary_values:
      - id: "BV-01-01"
        parameter: "systime.wYear"
        boundary: "1桁の年 (wYear=1)"
        expected: "%Y → L\"1\", %y → L\"01\""
      - id: "BV-01-02"
        parameter: "systime.wYear"
        boundary: "100の倍数の年 (wYear=2000)"
        expected: "%Y → L\"2000\", %y → L\"00\""
      - id: "BV-01-03"
        parameter: "systime.wYear"
        boundary: "5桁の年 (wYear=12345)"
        expected: "%Y → L\"12345\", %y → L\"45\""
      - id: "BV-01-04"
        parameter: "systime.wMonth"
        boundary: "1桁の月 (wMonth=1)"
        expected: "%m → L\"01\""
      - id: "BV-01-05"
        parameter: "systime.wMonth"
        boundary: "2桁の月 (wMonth=12)"
        expected: "%m → L\"12\""
      - id: "BV-01-06"
        parameter: "systime.wHour"
        boundary: "時の最小値 (wHour=0)"
        expected: "%H → L\"00\""
      - id: "BV-01-07"
        parameter: "systime.wHour"
        boundary: "時の最大値 (wHour=23)"
        expected: "%H → L\"23\""
      - id: "BV-01-08"
        parameter: "systime.wSecond"
        boundary: "秒の最大値 (wSecond=59)"
        expected: "%S → L\"59\""

    dependencies: []
    stub_strategy: "スタブ不要。SYSTEMTIME は構造体として直接渡すため外部依存なし。"

    observable_results:
      - "戻り値の std::wstring の内容"
      - "書式指定子が正しく置換されていること"
      - "書式指定子以外の文字が保存されていること"

    test_requirements:
      - id: "BR-01"
        description: "%Y 指定子の分岐を通過する"
        branch_ref: "BC-01-01"
        priority: "high"
      - id: "BR-02"
        description: "%y 指定子の分岐を通過する"
        branch_ref: "BC-01-02"
        priority: "high"
      - id: "BR-03"
        description: "%m 指定子の分岐を通過する"
        branch_ref: "BC-01-03"
        priority: "high"
      - id: "BR-04"
        description: "%d 指定子の分岐を通過する"
        branch_ref: "BC-01-04"
        priority: "high"
      - id: "BR-05"
        description: "%H 指定子の分岐を通過する"
        branch_ref: "BC-01-05"
        priority: "high"
      - id: "BR-06"
        description: "%M 指定子の分岐を通過する"
        branch_ref: "BC-01-06"
        priority: "high"
      - id: "BR-07"
        description: "%S 指定子の分岐を通過する"
        branch_ref: "BC-01-07"
        priority: "high"
      - id: "BR-08"
        description: "未知の指定子による else 分岐を通過する"
        branch_ref: "BC-01-08"
        priority: "high"
      - id: "BR-09"
        description: "% 文字の検出分岐を通過する"
        branch_ref: "BC-01-09"
        priority: "medium"
      - id: "BR-10"
        description: "null 文字による break 分岐を通過する"
        branch_ref: "BC-01-10"
        priority: "medium"
      - id: "EC-01"
        description: "空文字列の書式を処理する"
        class_ref: "EC-01-01"
        priority: "medium"
      - id: "EC-02"
        description: "書式指定子なしのリテラル文字列を処理する"
        class_ref: "EC-01-02"
        priority: "medium"
      - id: "EC-03"
        description: "全指定子を含む複合書式を処理する"
        class_ref: "EC-01-13"
        priority: "high"
      - id: "EC-04"
        description: "%% によるパーセント文字のエスケープを確認する"
        class_ref: "EC-01-11"
        priority: "high"
      - id: "EC-05"
        description: "null 文字を中間に含む書式を処理する"
        class_ref: "EC-01-12"
        priority: "medium"
      - id: "EC-06"
        description: "末尾が % で終わる書式を処理する"
        class_ref: "EC-01-15"
        priority: "low"
      - id: "BV-01"
        description: "1桁の年の書式化を検証する"
        boundary_ref: "BV-01-01"
        priority: "medium"
      - id: "BV-02"
        description: "100の倍数の年における %y の0パディングを検証する"
        boundary_ref: "BV-01-02"
        priority: "medium"
      - id: "BV-03"
        description: "5桁以上の年の書式化を検証する"
        boundary_ref: "BV-01-03"
        priority: "low"
      - id: "BV-04"
        description: "時の最小値・最大値の0パディングを検証する"
        boundary_ref: ["BV-01-06", "BV-01-07"]
        priority: "medium"

  # ---------------------------------------------------------------------------
  # TGT-02: ParseVersion
  # ---------------------------------------------------------------------------
  - id: "TGT-02"
    file: "sakura_core/util/format.cpp"
    header: "sakura_core/util/format.h"
    function_signature: "UINT32 ParseVersion(const WCHAR* sVer)"
    responsibility: >
      バージョン文字列を解析し、4つのバージョンコンポーネント（各8ビット）にパックした
      UINT32 値を返す。各コンポーネントは符号1bit+数値7bitの構成で、特殊文字列
      (alpha/beta/rc/pl) によるシフト値を加算して大小比較可能にする。
    preconditions:
      - "sVer は null 終端された有効な WCHAR 文字列であること"
    constraints:
      - "バージョンコンポーネントは最大4つまで処理される"
      - "各コンポーネントの数値部は2桁まで（3桁目以降は無視）"
      - "区切り文字は . - _ + の4種類を認識"
      - "残りの未使用コンポーネントは 0x80 (signed 0) で埋められる"

    branch_conditions:
      - id: "BC-02-01"
        condition: "*p == L'a' で始まる"
        true_action: "alpha と一致すれば p+=5、不一致なら p++。nShift = -0x60"
      - id: "BC-02-02"
        condition: "*p == L'b' で始まる"
        true_action: "beta と一致すれば p+=4、不一致なら p++。nShift = -0x40"
      - id: "BC-02-03"
        condition: "*p == L'r' || *p == L'R' で始まる"
        true_action: "rc/RC と一致すれば p+=2、不一致なら p++。nShift = -0x20"
      - id: "BC-02-04"
        condition: "*p == L'p' で始まる"
        true_action: "pl と一致すれば p+=2、不一致なら p++。nShift = 0x20"
      - id: "BC-02-05"
        condition: "!iswdigit(*p) かつ上記に該当しない"
        true_action: "nShift = -0x80（不明文字）"
      - id: "BC-02-06"
        condition: "数字で始まる（通常のバージョン番号）"
        true_action: "nShift = 0"
      - id: "BC-02-07"
        condition: "数値抽出ループ: nDigit > 2"
        true_action: "数字が2桁を超えたらbreakで止める"
      - id: "BC-02-08"
        condition: "区切り文字のスキップ: *p が .-_+ のいずれか"
        true_action: "区切り文字をスキップ"
      - id: "BC-02-09"
        condition: "ループ条件: *p != 0 && i < 4"
        true_action: "次のバージョンコンポーネントを処理"
        false_action: "残りを 0x80 で埋める"
      - id: "BC-02-10"
        condition: "alpha 文字列の完全一致: wcsncmp_literal(p, L\"alpha\") == 0"
        true_action: "p += 5 (alpha全体をスキップ)"
        false_action: "p++ (先頭の 'a' のみスキップ)"
      - id: "BC-02-11"
        condition: "beta 文字列の完全一致: wcsncmp_literal(p, L\"beta\") == 0"
        true_action: "p += 4 (beta全体をスキップ)"
        false_action: "p++ (先頭の 'b' のみスキップ)"
      - id: "BC-02-12"
        condition: "rc 文字列の大小無視一致: wcsnicmp_literal(p, L\"rc\") == 0"
        true_action: "p += 2 (rc全体をスキップ)"
        false_action: "p++ (先頭の 'r'/'R' のみスキップ)"
      - id: "BC-02-13"
        condition: "pl 文字列の完全一致: wcsncmp_literal(p, L\"pl\") == 0"
        true_action: "p += 2 (pl全体をスキップ)"
        false_action: "p++ (先頭の 'p' のみスキップ)"

    equivalence_classes:
      - id: "EC-02-01"
        parameter: "sVer"
        class_name: "数字のみ（区切りなし）"
        representative: "L\"1234\""
        expected: "1,2,3,4 の4コンポーネントとして解析"
      - id: "EC-02-02"
        parameter: "sVer"
        class_name: "ドット区切りの標準バージョン"
        representative: "L\"2.4.1.0\""
        expected: "2,4,1,0 の4コンポーネント"
      - id: "EC-02-03"
        parameter: "sVer"
        class_name: "alpha 修飾子付き"
        representative: "L\"2.4.1alpha\""
        expected: "第3コンポーネントが 1 + alpha シフト (-0x60)"
      - id: "EC-02-04"
        parameter: "sVer"
        class_name: "beta 修飾子付き"
        representative: "L\"2.4.1beta\""
        expected: "第3コンポーネントが 1 + beta シフト (-0x40)"
      - id: "EC-02-05"
        parameter: "sVer"
        class_name: "rc 修飾子付き"
        representative: "L\"2.4.1rc\""
        expected: "第3コンポーネントが 1 + rc シフト (-0x20)"
      - id: "EC-02-06"
        parameter: "sVer"
        class_name: "RC 修飾子付き（大文字）"
        representative: "L\"2.4.1RC\""
        expected: "rc と同等に処理される（大小無視比較）"
      - id: "EC-02-07"
        parameter: "sVer"
        class_name: "pl 修飾子付き"
        representative: "L\"2.4.1pl\""
        expected: "第3コンポーネントが 1 + pl シフト (+0x20)"
      - id: "EC-02-08"
        parameter: "sVer"
        class_name: "不明な文字修飾子"
        representative: "L\"2.4.1x\""
        expected: "nShift = -0x80 が適用される"
      - id: "EC-02-09"
        parameter: "sVer"
        class_name: "省略形の修飾子（先頭文字のみ）"
        representative: "L\"2.4.1a\""
        expected: "alpha と同じシフト値 (-0x60) が適用される"
      - id: "EC-02-10"
        parameter: "sVer"
        class_name: "区切り文字バリエーション (ハイフン)"
        representative: "L\"2-4-1-0\""
        expected: "ドット区切りと同等の結果"
      - id: "EC-02-11"
        parameter: "sVer"
        class_name: "区切り文字バリエーション (アンダースコア)"
        representative: "L\"2_4_1_0\""
        expected: "ドット区切りと同等の結果"
      - id: "EC-02-12"
        parameter: "sVer"
        class_name: "区切り文字バリエーション (プラス)"
        representative: "L\"2+4+1+0\""
        expected: "ドット区切りと同等の結果"
      - id: "EC-02-13"
        parameter: "sVer"
        class_name: "空文字列"
        representative: "L\"\""
        expected: "全コンポーネントが 0x80 で埋められる (= 0x80808080)"
      - id: "EC-02-14"
        parameter: "sVer"
        class_name: "5コンポーネント以上"
        representative: "L\"1.2.3.4.5\""
        expected: "5番目以降は無視される"
      - id: "EC-02-15"
        parameter: "sVer"
        class_name: "修飾子のtypo (alfa, bete等)"
        representative: "L\"2.4.1alfa\""
        expected: "先頭文字 'a' に一致するため alpha 扱い"
      - id: "EC-02-16"
        parameter: "sVer"
        class_name: "数字と修飾子を区切り文字なしで連結"
        representative: "L\"2.4.1alpha1\""
        expected: "alpha の後の数字がバージョン番号の一部として解析される"

    boundary_values:
      - id: "BV-02-01"
        parameter: "数値部の桁数"
        boundary: "1桁 (nDigit=1)"
        expected: "正常に解析される"
      - id: "BV-02-02"
        parameter: "数値部の桁数"
        boundary: "2桁 (nDigit=2, 最大)"
        expected: "正常に解析される（99が最大値）"
      - id: "BV-02-03"
        parameter: "数値部の桁数"
        boundary: "3桁 (nDigit>2)"
        expected: "3桁目以降が切り捨てられる"
      - id: "BV-02-04"
        parameter: "コンポーネント数"
        boundary: "0個（空文字列）"
        expected: "全コンポーネントが 0x80"
      - id: "BV-02-05"
        parameter: "コンポーネント数"
        boundary: "1個"
        expected: "残り3コンポーネントが 0x80 で埋められる"
      - id: "BV-02-06"
        parameter: "コンポーネント数"
        boundary: "4個（最大）"
        expected: "全4コンポーネントが値を持つ"
      - id: "BV-02-07"
        parameter: "コンポーネント数"
        boundary: "5個以上"
        expected: "5番目以降は無視される"
      - id: "BV-02-08"
        parameter: "nShift + nVer + 128"
        boundary: "最小値: nShift=-0x80, nVer=0 → 128-128+0=0"
        expected: "コンポーネント値が 0x00"
      - id: "BV-02-09"
        parameter: "nShift + nVer + 128"
        boundary: "最大値: nShift=0x20, nVer=99 → 128+32+99=259 (0x103, 8bit超過)"
        expected: "オーバーフローの可能性がある"

    dependencies:
      - name: "wcsncmp_literal"
        type: "マクロ/インライン関数"
        description: "ワイド文字列のリテラル比較"
      - name: "wcsnicmp_literal"
        type: "マクロ/インライン関数"
        description: "ワイド文字列の大小無視リテラル比較"
      - name: "iswdigit"
