  # ---------------------------------------------------------------------------
  # TGT-07: Convert_ZeneisuToHaneisu
  # ---------------------------------------------------------------------------
  - id: "TGT-07"
    file: "sakura_core/convert/convert_util.cpp"
    header: "sakura_core/convert/convert_util.h"
    function_signature: "void Convert_ZeneisuToHaneisu(wchar_t* pData, int nLength)"
    responsibility: >
      全角英数字・記号を半角英数字・記号に in-place 変換する。文字数は変化しない。
      内部ヘルパー ZeneisuToHaneisu_ で1文字ずつ変換を行う。
    preconditions:
      - "pData は有効な wchar_t 配列を指すポインタであること"
      - "nLength は配列の有効長であること"
    constraints:
      - "文字数は不変（in-place 変換）"
      - "変換対象外の文字はそのまま保持される"

    branch_conditions:
      - id: "BC-07-01"
        condition: "c >= L'A' && c <= L'Z' (全角大文字)"
        true_action: "半角大文字 'A' + (c - L'A') に変換"
      - id: "BC-07-02"
        condition: "c >= L'a' && c <= L'z' (全角小文字)"
        true_action: "半角小文字 'a' + (c - L'a') に変換"
      - id: "BC-07-03"
        condition: "c >= L'0' && c <= L'9' (全角数字)"
        true_action: "半角数字 '0' + (c - L'0') に変換"
      - id: "BC-07-04"
        condition: "wcschr_idx(tableZenKigo, c, &n) (全角記号テーブルに存在)"
        true_action: "tableHanKigo[n] に変換"
      - id: "BC-07-05"
        condition: "上記のいずれにも該当しない"
        true_action: "変換せず、そのまま返す"

    equivalence_classes:
      - id: "EC-07-01"
        parameter: "pData"
        class_name: "全角大文字 (A-Z)"
        representative: "L\"ABC\""
        expected: "L\"ABC\""
      - id: "EC-07-02"
        parameter: "pData"
        class_name: "全角小文字 (a-z)"
        representative: "L\"abc\""
        expected: "L\"abc\""
      - id: "EC-07-03"
        parameter: "pData"
        class_name: "全角数字 (0-9)"
        representative: "L\"012\""
        expected: "L\"012\""
      - id: "EC-07-04"
        parameter: "pData"
        class_name: "全角記号 (テーブル内)"
        representative: "L\"　，．＋－\""
        expected: "L\" ,.+-\""
      - id: "EC-07-05"
        parameter: "pData"
        class_name: "半角文字 (変換対象外)"
        representative: "L\"abc123\""
        expected: "L\"abc123\"（そのまま）"
      - id: "EC-07-06"
        parameter: "pData"
        class_name: "ひらがな・漢字 (変換対象外)"
        representative: "L\"あいう漢字\""
        expected: "そのまま"
      - id: "EC-07-07"
        parameter: "pData"
        class_name: "全角・半角・変換対象外の混在"
        representative: "L\"Ａbc１2あ\""
        expected: "L\"Abc12あ\""
      - id: "EC-07-08"
        parameter: "pData"
        class_name: "空配列 (nLength=0)"
        representative: "L\"\", nLength=0"
        expected: "変更なし"

    boundary_values:
      - id: "BV-07-01"
        parameter: "全角大文字の範囲"
        boundary: "先頭: L'A' (U+FF21)"
        expected: "'A' に変換"
      - id: "BV-07-02"
        parameter: "全角大文字の範囲"
        boundary: "末尾: L'Z' (U+FF3A)"
        expected: "'Z' に変換"
      - id: "BV-07-03"
        parameter: "全角大文字の範囲"
        boundary: "範囲外直前: U+FF20"
        expected: "変換されない（記号テーブルで変換される可能性あり）"
      - id: "BV-07-04"
        parameter: "全角大文字の範囲"
        boundary: "範囲外直後: U+FF3B"
        expected: "変換されない"
      - id: "BV-07-05"
        parameter: "全角小文字の範囲"
        boundary: "先頭: L'a' (U+FF41)"
        expected: "'a' に変換"
      - id: "BV-07-06"
        parameter: "全角小文字の範囲"
        boundary: "末尾: L'z' (U+FF5A)"
        expected: "'z' に変換"
      - id: "BV-07-07"
        parameter: "全角数字の範囲"
        boundary: "先頭: L'0' (U+FF10)"
        expected: "'0' に変換"
      - id: "BV-07-08"
        parameter: "全角数字の範囲"
        boundary: "末尾: L'9' (U+FF19)"
        expected: "'9' に変換"
      - id: "BV-07-09"
        parameter: "nLength"
        boundary: "nLength=0"
        expected: "ループに入らず何も変更しない"
      - id: "BV-07-10"
        parameter: "nLength"
        boundary: "nLength=1 (1文字)"
        expected: "1文字のみ変換処理される"

    dependencies:
      - name: "wcschr_idx"
        type: "ファイル内ローカル関数"
        description: "wcschr の結果をインデックスで受け取る"
      - name: "tableZenKigo"
        type: "ファイル内静的テーブル"
        description: "全角記号テーブル"
      - name: "tableHanKigo"
        type: "ファイル内静的テーブル"
        description: "半角記号テーブル"
    stub_strategy: "スタブ不要。wcschr_idx と変換テーブルは同一翻訳単位内で定義されている。"

    observable_results:
      - "pData の in-place 書き換え結果"
      - "文字数が不変であること"

    test_requirements:
      - id: "BR-46"
        description: "全角大文字 (A-Z) の変換パスを検証する"
        branch_ref: "BC-07-01"
        priority: "high"
      - id: "BR-47"
        description: "全角小文字 (a-z) の変換パスを検証する"
        branch_ref: "BC-07-02"
        priority: "high"
      - id: "BR-48"
        description: "全角数字 (0-9) の変換パスを検証する"
        branch_ref: "BC-07-03"
        priority: "high"
      - id: "BR-49"
        description: "全角記号テーブルによる変換パスを検証する"
        branch_ref: "BC-07-04"
        priority: "high"
      - id: "BR-50"
        description: "変換対象外文字の無変換パスを検証する"
        branch_ref: "BC-07-05"
        priority: "medium"
      - id: "EC-23"
        description: "全カテゴリの文字が正しく変換されることを検証する"
        class_ref: ["EC-07-01", "EC-07-02", "EC-07-03", "EC-07-04"]
        priority: "high"
      - id: "EC-24"
        description: "変換対象外の文字が変更されないことを検証する"
        class_ref: ["EC-07-05", "EC-07-06"]
        priority: "medium"
      - id: "EC-25"
        description: "混在文字列が正しく処理されることを検証する"
        class_ref: "EC-07-07"
        priority: "high"
      - id: "BV-09"
        description: "全角文字範囲の境界値（先頭・末尾・範囲外直前直後）を検証する"
        boundary_ref: ["BV-07-01", "BV-07-02", "BV-07-03", "BV-07-04"]
