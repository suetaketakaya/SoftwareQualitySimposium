      - id: "BC-06-04"
        condition: "kindCur == CK_UDEF"
        true_action: "kindCur を CK_CSYM にマッピング（差異点）"
      - id: "BC-06-05"
        condition: "kindPre == CK_CTRL"
        true_action: "kindPre は CK_CTRL のまま（差異点: 通常版は ETC）"
      - id: "BC-06-06"
        condition: "kindCur == CK_CTRL"
        true_action: "kindCur は CK_CTRL のまま（差異点: 通常版は ETC）"

    equivalence_classes:
      - id: "EC-06-01"
        parameter: "kindPre, kindCur"
        class_name: "ユーザー定義 + CSYM (4KW版: マッピング後同種)"
        representative: "CK_UDEF, CK_CSYM"
        expected: "CK_CSYM（UDEF→CSYMにマッピング後同種）"
      - id: "EC-06-02"
        parameter: "kindPre, kindCur"
        class_name: "ユーザー定義 + ETC (4KW版: マッピング後別種)"
        representative: "CK_UDEF, CK_ETC"
        expected: "CK_NULL（UDEF→CSYMにマッピング後、CSYMとETCは別種）"
      - id: "EC-06-03"
        parameter: "kindPre, kindCur"
        class_name: "制御文字 + ETC (4KW版: マッピングなしで別種)"
        representative: "CK_CTRL, CK_ETC"
        expected: "CK_NULL（CTRLのまま → ETCとは別種）"
      - id: "EC-06-04"
        parameter: "kindPre, kindCur"
        class_name: "制御文字 + 制御文字 (4KW版: 同種)"
        representative: "CK_CTRL, CK_CTRL"
        expected: "CK_CTRL（初回同種チェックで一致）"

    boundary_values: []

