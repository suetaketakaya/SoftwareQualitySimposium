  # ---------------------------------------------------------------------------
  # TGT-05: WhatKindOfTwoChars
  # ---------------------------------------------------------------------------
  - id: "TGT-05"
    file: "sakura_core/parse/CWordParse.cpp"
    header: "sakura_core/parse/CWordParse.h"
    function_signature: "static ECharKind CWordParse::WhatKindOfTwoChars(ECharKind kindPre, ECharKind kindCur)"
    responsibility: >
      2つの文字種別を受け取り、それらが同一の単語として結合可能かを判定する。
      結合可能な場合は結合後の文字種別を返し、不可能な場合は CK_NULL を返す。
      全角長音・濁点のひらがな/カタカナへの引きずり規則を実装する。
    preconditions:
      - "kindPre, kindCur は有効な ECharKind 列挙値であること"
    constraints:
      - "純粋関数（状態なし、副作用なし）"
      - "ラテン文字は CSYM にマッピングされる"
      - "ユーザー定義文字は ETC にマッピングされる（WhatKindOfTwoChars4KW との差異）"
      - "制御文字は ETC にマッピングされる（WhatKindOfTwoChars4KW との差異）"

    branch_conditions:
      - id: "BC-05-01"
        condition: "kindPre == kindCur (初回同種チェック)"
        true_action: "kindCur を返す"
      - id: "BC-05-02"
        condition: "(kindPre が ZEN_NOBASU/ZEN_DAKU) && (kindCur が ZEN_KATA/HIRA)"
        true_action: "kindCur を返す（長音/濁点がカタカナ/ひらがなに引きずられる）"
      - id: "BC-05-03"
        condition: "(kindCur が ZEN_NOBASU/ZEN_DAKU) && (kindPre が ZEN_KATA/HIRA)"
        true_action: "kindPre を返す（カタカナ/ひらがなが長音/濁点を引きずる）"
      - id: "BC-05-04"
        condition: "(kindPre が ZEN_NOBASU/ZEN_DAKU) && (kindCur が ZEN_NOBASU/ZEN_DAKU)"
        true_action: "kindCur を返す（長音・濁点の連続は同種とみなす）"
      - id: "BC-05-05"
        condition: "kindPre == CK_LATIN"
        true_action: "kindPre を CK_CSYM にマッピング"
      - id: "BC-05-06"
        condition: "kindCur == CK_LATIN"
