  # ---------------------------------------------------------------------------
  # TGT-03: CompareVersion
  # ---------------------------------------------------------------------------
  - id: "TGT-03"
    file: "sakura_core/util/format.cpp"
    header: "sakura_core/util/format.h"
    function_signature: "int CompareVersion(const WCHAR* verA, const WCHAR* verB)"
    responsibility: >
      2つのバージョン文字列を比較し、その大小関係を返す。
      内部で ParseVersion を呼び出し、結果の UINT32 値の差分を返す。
    preconditions:
      - "verA, verB は null 終端された有効な WCHAR 文字列であること"
    constraints:
      - "ParseVersion の仕様に準拠する"
      - "戻り値は UINT32 の差分（int にキャスト）のため、極端に大きな差の場合オーバーフローの可能性がある"

    branch_conditions:
      - id: "BC-03-01"
        condition: "nVerA == nVerB"
        true_action: "戻り値 0 (等しい)"
      - id: "BC-03-02"
        condition: "nVerA > nVerB"
        true_action: "戻り値 > 0 (A が新しい)"
      - id: "BC-03-03"
        condition: "nVerA < nVerB"
        true_action: "戻り値 < 0 (B が新しい)"

    equivalence_classes:
      - id: "EC-03-01"
        parameter: "verA, verB"
        class_name: "同一バージョン"
        representative: "L\"2.4.1.0\", L\"2.4.1.0\""
        expected: "0"
      - id: "EC-03-02"
        parameter: "verA, verB"
        class_name: "A が新しい (メジャーバージョン差)"
        representative: "L\"3.0.0.0\", L\"2.0.0.0\""
        expected: "> 0"
      - id: "EC-03-03"
        parameter: "verA, verB"
        class_name: "B が新しい (マイナーバージョン差)"
        representative: "L\"2.3.0.0\", L\"2.4.0.0\""
        expected: "< 0"
      - id: "EC-03-04"
        parameter: "verA, verB"
        class_name: "修飾子による差 (alpha < beta)"
        representative: "L\"2.4.0alpha\", L\"2.4.0beta\""
        expected: "< 0"
      - id: "EC-03-05"
        parameter: "verA, verB"
        class_name: "修飾子による差 (rc < 無修飾)"
        representative: "L\"2.4.0rc\", L\"2.4.0\""
        expected: "< 0"
      - id: "EC-03-06"
        parameter: "verA, verB"
        class_name: "修飾子による差 (無修飾 < pl)"
        representative: "L\"2.4.0\", L\"2.4.0pl\""
        expected: "< 0"
      - id: "EC-03-07"
        parameter: "verA, verB"
        class_name: "区切り文字の違い (同等)"
        representative: "L\"2.4.1.0\", L\"2-4_1+0\""
        expected: "0"

    boundary_values:
      - id: "BV-03-01"
        parameter: "verA, verB"
        boundary: "最小差 (1コンポーネント差が1)"
        expected: "非0の値"
      - id: "BV-03-02"
        parameter: "verA, verB"
        boundary: "両方とも空文字列"
        expected: "0"

    dependencies:
      - name: "ParseVersion"
        type: "内部関数"
        description: "バージョン文字列を UINT32 にパック"
    stub_strategy: "スタブ不要。ParseVersion は同一ファイル内の関数であり、直接呼び出す。"

    observable_results:
      - "戻り値の int 値の符号（正/負/0）"

    test_requirements:
      - id: "BR-24"
        description: "同一バージョンで 0 が返ることを検証する"
        branch_ref: "BC-03-01"
        priority: "high"
      - id: "BR-25"
        description: "A が新しい場合に正の値が返ることを検証する"
        branch_ref: "BC-03-02"
        priority: "high"
      - id: "BR-26"
        description: "B が新しい場合に負の値が返ることを検証する"
        branch_ref: "BC-03-03"
        priority: "high"
      - id: "EC-11"
        description: "修飾子による順序関係の全パターンを検証する (x < a < b < rc < 無 < pl)"
        class_ref: ["EC-03-04", "EC-03-05", "EC-03-06"]
        priority: "high"
      - id: "EC-12"
        description: "異なる区切り文字で同一バージョンと判定されることを検証する"
        class_ref: "EC-03-07"
        priority: "medium"
      - id: "DP-01"
        description: "ParseVersion の結果を正しく利用していることを間接的に検証する"
        priority: "medium"

  # ---------------------------------------------------------------------------
  # TGT-04: IsMailAddress
  # ---------------------------------------------------------------------------
  - id: "TGT-04"
    file: "sakura_core/parse/CWordParse.cpp"
    header: "sakura_core/parse/CWordParse.h"
    function_signature: "BOOL IsMailAddress(const wchar_t* pszBuf, int offset, size_t cchBuf, int* pnAddressLength)"
    responsibility: >
      文字列バッファ中の指定位置がメールアドレスの先頭であるかを判定する。
      ローカルパート@ドメインパートの形式を検証し、TRUEの場合はアドレス長を出力する。
    preconditions:
      - "pszBuf は有効な wchar_t 配列を指すポインタであること"
      - "cchBuf はバッファの全長を示すこと"
      - "pnAddressLength は NULL 可"
    constraints:
      - "ローカルパートの先頭が . (ドット) であってはならない"
      - "ローカルパートの有効文字は 0x21-0x7E のうち \"(),:;<>@[\\] を除く文字"
      - "ドメインパートは英数字、ハイフン、アンダースコアで構成されるラベルをドットで区切った形式"
      - "ドメインパートにはドットが最低1つ必要"
      - "正の offset が与えられた場合、直前文字との境界判定を行う"

    branch_conditions:
      - id: "BC-04-01"
        condition: "0 < offset && IsValidChar(pszBuf[offset-1])"
        true_action: "FALSE を返す（直前が有効文字 → メールアドレスの途中である）"
      - id: "BC-04-02"
        condition: "pszBuf[0] == L'.' (先頭がドット)"
        true_action: "FALSE を返す"
      - id: "BC-04-03"
        condition: "!IsValidChar(pszBuf[0]) (先頭が無効文字)"
        true_action: "FALSE を返す"
      - id: "BC-04-04"
        condition: "j == 0 || j >= nBufLen - 2 (ローカルパートの長さ異常)"
        true_action: "FALSE を返す"
      - id: "BC-04-05"
        condition: "L'@' != pszBuf[j] (@ が見つからない)"
        true_action: "FALSE を返す"
      - id: "BC-04-06"
        condition: "0 == j - nBgn (ドメインラベルの長さが0)"
        true_action: "FALSE を返す"
      - id: "BC-04-07"
        condition: "L'.' != pszBuf[j] (ドメインラベル間にドットがない)"
        true_action: "nDotCount==0 なら FALSE、それ以外なら終了"
      - id: "BC-04-08"
        condition: "nDotCount == 0 (ドメインにドットが1つもない)"
        true_action: "FALSE を返す"
      - id: "BC-04-09"
        condition: "nullptr != pnAddressLength"
        true_action: "アドレス長を出力パラメータに設定"

    equivalence_classes:
      - id: "EC-04-01"
        parameter: "pszBuf"
        class_name: "標準的なメールアドレス"
        representative: "L\"test@example.com\""
        expected: "TRUE, length=16"
      - id: "EC-04-02"
        parameter: "pszBuf"
        class_name: "空文字列"
        representative: "L\"\""
        expected: "FALSE"
      - id: "EC-04-03"
        parameter: "pszBuf"
        class_name: "@ なし"
        representative: "L\"testexample.com\""
        expected: "FALSE"
      - id: "EC-04-04"
        parameter: "pszBuf"
        class_name: "先頭がドット"
        representative: "L\".test@example.com\""
        expected: "FALSE"
      - id: "EC-04-05"
        parameter: "pszBuf"
        class_name: "ドメインにドットなし"
        representative: "L\"test@example\""
        expected: "FALSE"
      - id: "EC-04-06"
        parameter: "pszBuf"
        class_name: "複数ドットのドメイン (co.jp)"
        representative: "L\"test@example.co.jp\""
        expected: "TRUE"
      - id: "EC-04-07"
        parameter: "pszBuf"
        class_name: "ローカルパートに記号類を含む"
        representative: "L\"test!#$%&'*+-/=?^_`{|}~@example.com\""
        expected: "TRUE"
      - id: "EC-04-08"
        parameter: "pszBuf"
        class_name: "ローカルパートに禁止文字を含む"
        representative: "L\"te\"st@example.com\""
        expected: "FALSE（ダブルクオートは禁止文字）"
      - id: "EC-04-09"
        parameter: "pszBuf"
        class_name: "ドメインラベルにハイフンを含む"
        representative: "L\"test@test-domain.com\""
        expected: "TRUE"
      - id: "EC-04-10"
        parameter: "pszBuf"
        class_name: "ドメインラベルにアンダースコアを含む"
        representative: "L\"test@test_domain.com\""
        expected: "TRUE（現行実装はアンダースコアを許容）"
      - id: "EC-04-11"
        parameter: "pszBuf"
        class_name: "アドレスの後にスペースが続く"
        representative: "L\"test@example.com \""
        expected: "TRUE, length=16（スペースの手前まで）"
      - id: "EC-04-12"
        parameter: "offset"
        class_name: "offset=0 (先頭からの判定)"
        representative: "offset=0"
        expected: "境界判定なし"
      - id: "EC-04-13"
        parameter: "offset"
        class_name: "正の offset (途中からの判定)"
        representative: "L\" test@example.com\", offset=1"
        expected: "直前文字がスペースなので TRUE"
      - id: "EC-04-14"
        parameter: "offset"
        class_name: "正の offset で直前が有効文字"
        representative: "L\"xtest@example.com\", offset=1"
        expected: "FALSE（直前が有効文字のため境界判定で却下）"
      - id: "EC-04-15"
        parameter: "pnAddressLength"
        class_name: "出力パラメータが NULL"
        representative: "pnAddressLength=NULL"
        expected: "クラッシュしない"

    boundary_values:
      - id: "BV-04-01"
        parameter: "ローカルパートの長さ"
        boundary: "最小 (1文字: a@b.cc)"
        expected: "TRUE"
      - id: "BV-04-02"
        parameter: "ローカルパートの長さ"
        boundary: "64文字"
        expected: "TRUE（現行実装は長さ制限なし）"
      - id: "BV-04-03"
        parameter: "ドメインラベルの長さ"
        boundary: "最小 (1文字)"
        expected: "TRUE"
      - id: "BV-04-04"
        parameter: "ドメインのドット数"
        boundary: "0 (ドットなし)"
        expected: "FALSE"
      - id: "BV-04-05"
        parameter: "ドメインのドット数"
        boundary: "1 (最小有効)"
        expected: "TRUE"
      - id: "BV-04-06"
        parameter: "ドメインのドット数"
        boundary: "複数 (co.jp 等)"
        expected: "TRUE"
      - id: "BV-04-07"
        parameter: "nBufLen"
        boundary: "ローカルパート + @ で終了 (j >= nBufLen - 2 になるケース)"
        expected: "FALSE"
      - id: "BV-04-08"
        parameter: "IsValidChar の境界"
        boundary: "0x21 (最小有効文字 '!')"
        expected: "有効文字として扱われる"
      - id: "BV-04-09"
        parameter: "IsValidChar の境界"
        boundary: "0x7E (最大有効文字 '~')"
        expected: "有効文字として扱われる"
      - id: "BV-04-10"
        parameter: "IsValidChar の境界"
        boundary: "0x20 (スペース、無効)"
        expected: "無効文字として扱われる"
      - id: "BV-04-11"
        parameter: "IsValidChar の境界"
        boundary: "0x7F (DEL、無効)"
        expected: "無効文字として扱われる"

    dependencies: []
    stub_strategy: "スタブ不要。IsValidChar はラムダ（構造体演算子）として関数内に定義されている。"

    observable_results:
      - "戻り値の BOOL (TRUE/FALSE)"
      - "pnAddressLength に格納されるアドレス長"

    test_requirements:
      - id: "BR-27"
