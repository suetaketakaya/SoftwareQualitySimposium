      - "制御文字 → CTRL のまま（通常版は ETC）"

    branch_conditions:
      - id: "BC-06-01"
        condition: "kindPre == kindCur (初回同種チェック)"
        true_action: "kindCur を返す"
      - id: "BC-06-02"
