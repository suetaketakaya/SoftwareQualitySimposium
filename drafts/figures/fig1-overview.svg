<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">図1: 提案手法の全体構成</text>

  <!-- ===== Phase 1 ===== -->
  <rect x="20" y="60" width="200" height="240" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <rect x="20" y="60" width="200" height="32" rx="6" fill="#888" stroke="#666" stroke-width="1.5"/>
  <text x="120" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Phase 1: リポジトリ解析</text>

  <!-- Input -->
  <rect x="45" y="106" width="150" height="28" rx="4" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="120" y="125" text-anchor="middle" font-size="11" fill="#444">入力: ソースコード</text>

  <!-- Roles -->
  <rect x="40" y="146" width="160" height="56" rx="4" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="120" y="165" text-anchor="middle" font-size="10.5" fill="#333">LLM: 解析・候補選定</text>
  <text x="120" y="181" text-anchor="middle" font-size="10.5" fill="#333">人間: レビュー・承認</text>

  <!-- Output -->
  <rect x="35" y="216" width="170" height="36" rx="4" fill="#fff" stroke="#666" stroke-width="1.2"/>
  <text x="120" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">出力: テスト対象候補</text>
  <text x="120" y="246" text-anchor="middle" font-size="9.5" fill="#666">（8関数選定）</text>

  <!-- Down arrow to detail -->
  <line x1="120" y1="252" x2="120" y2="270" stroke="#aaa" stroke-width="1"/>

  <text x="120" y="288" text-anchor="middle" font-size="9" fill="#888">対象関数の</text>
  <text x="120" y="298" text-anchor="middle" font-size="9" fill="#888">ソースコード</text>

  <!-- ===== Arrow Phase1 -> Phase2 ===== -->
  <line x1="220" y1="180" x2="258" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Phase 2 ===== -->
  <rect x="260" y="60" width="200" height="240" rx="6" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
  <rect x="260" y="60" width="200" height="32" rx="6" fill="#555" stroke="#666" stroke-width="1.5"/>
  <text x="360" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Phase 2: テスト要求モデル生成</text>

  <!-- Input -->
  <rect x="285" y="106" width="150" height="28" rx="4" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="360" y="125" text-anchor="middle" font-size="11" fill="#444">入力: 対象ソースコード</text>

  <!-- Roles -->
  <rect x="280" y="146" width="160" height="56" rx="4" fill="#e0e0e0" stroke="#aaa" stroke-width="1"/>
  <text x="360" y="165" text-anchor="middle" font-size="10.5" fill="#333">LLM: 静的解析＋推論</text>
  <text x="360" y="181" text-anchor="middle" font-size="10.5" fill="#333">人間: レビュー・修正</text>

  <!-- Output (highlighted) -->
  <rect x="275" y="216" width="170" height="36" rx="4" fill="#d9d9d9" stroke="#222" stroke-width="2.5"/>
  <text x="360" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">出力: テスト要求モデル</text>
  <text x="360" y="246" text-anchor="middle" font-size="9.5" fill="#444">（YAML形式, 5種別99件）</text>

  <!-- ===== Arrow Phase2 -> Phase3 ===== -->
  <line x1="460" y1="180" x2="498" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Phase 3 ===== -->
  <rect x="500" y="60" width="200" height="240" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <rect x="500" y="60" width="200" height="32" rx="6" fill="#888" stroke="#666" stroke-width="1.5"/>
  <text x="600" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Phase 3: テストコード生成</text>

  <!-- Input -->
  <rect x="525" y="106" width="150" height="28" rx="4" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="125" text-anchor="middle" font-size="11" fill="#444">入力: テスト要求モデル</text>

  <!-- Roles -->
  <rect x="520" y="146" width="160" height="56" rx="4" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="600" y="165" text-anchor="middle" font-size="10.5" fill="#333">LLM: コード生成</text>
  <text x="600" y="181" text-anchor="middle" font-size="10.5" fill="#333">人間: 確認・修正指示</text>

  <!-- Output -->
  <rect x="515" y="216" width="170" height="36" rx="4" fill="#fff" stroke="#666" stroke-width="1.2"/>
  <text x="600" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">出力: テストコード</text>
  <text x="600" y="246" text-anchor="middle" font-size="9.5" fill="#666">（Google Test, 145件）</text>

  <!-- ===== Highlighted intermediate artifact (Test Requirement Model) ===== -->
  <rect x="260" y="320" width="200" height="90" rx="8" fill="#e8e8e8" stroke="#222" stroke-width="3"/>
  <text x="360" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">テスト要求モデル</text>
  <text x="360" y="362" text-anchor="middle" font-size="10" fill="#444">（中間成果物・YAML形式）</text>
  <line x1="290" y1="372" x2="430" y2="372" stroke="#999" stroke-width="0.8"/>
  <text x="360" y="389" text-anchor="middle" font-size="9.5" fill="#555">人間がレビュー・修正可能な</text>
  <text x="360" y="403" text-anchor="middle" font-size="9.5" fill="#555">構造化されたテスト仕様</text>

  <!-- Arrow from Phase2 output down to highlighted box -->
  <line x1="360" y1="252" x2="360" y2="318" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow from highlighted box right to Phase3 input -->
  <path d="M 460 365 L 490 365 L 490 120 L 523 120" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- ===== Bottom: Results summary ===== -->
  <rect x="500" y="320" width="200" height="60" rx="6" fill="#f0f0f0" stroke="#888" stroke-width="1.2"/>
  <text x="600" y="342" text-anchor="middle" font-size="10.5" fill="#333">初回PASS率: 91.7%</text>
  <text x="600" y="358" text-anchor="middle" font-size="10.5" fill="#333">修正後: 100% (145/145)</text>
  <text x="600" y="374" text-anchor="middle" font-size="9" fill="#888">（1回のやり直しで達成）</text>

  <!-- Arrow from Phase3 output down to results -->
  <line x1="600" y1="252" x2="600" y2="318" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Legend ===== -->
  <rect x="20" y="440" width="680" height="70" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="35" y="460" font-size="10" font-weight="bold" fill="#555">凡例:</text>

  <!-- Legend: dashed = input -->
  <rect x="80" y="450" width="40" height="16" rx="3" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="130" y="462" font-size="9.5" fill="#555">入力データ</text>

  <!-- Legend: normal box = role -->
  <rect x="210" y="450" width="40" height="16" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="260" y="462" font-size="9.5" fill="#555">LLM・人間の役割</text>

  <!-- Legend: bold box = output -->
  <rect x="370" y="450" width="40" height="16" rx="3" fill="#fff" stroke="#666" stroke-width="1.2"/>
  <text x="420" y="462" font-size="9.5" fill="#555">出力成果物</text>

  <!-- Legend: thick box = key artifact -->
  <rect x="510" y="450" width="40" height="16" rx="3" fill="#d9d9d9" stroke="#222" stroke-width="2.5"/>
  <text x="560" y="462" font-size="9.5" fill="#555">中核成果物（テスト要求モデル）</text>

  <!-- Legend: LLM-Human cooperation note -->
  <text x="35" y="498" font-size="9.5" fill="#777">各フェーズにおいて LLM が主導的に作業を行い、人間がレビュー・修正を担う協調型プロセス</text>
</svg>