<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430">
  <defs>
    <pattern id="pat-br" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#4a4a4a"/>
    </pattern>
    <pattern id="pat-ec" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#e0e0e0"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#777" stroke-width="2"/>
    </pattern>
    <pattern id="pat-bv" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#a0a0a0"/>
    </pattern>
    <pattern id="pat-er" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#f0f0f0"/>
      <circle cx="4" cy="4" r="1.8" fill="#666"/>
    </pattern>
    <pattern id="pat-dp" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(-45)">
      <rect width="7" height="7" fill="#d8d8d8"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#444" stroke-width="2"/>
    </pattern>
  </defs>

  <style>
    text { font-family: "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
  </style>

  <rect width="680" height="430" fill="white"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">図2: テスト要求の種別内訳（N=99）</text>

  <!-- Pie: center=(250,230) r=155 -->
  <!-- BR 55.6% -->
  <path d="M260.00,70.00 A150,150 0 1,1 208.30,360.81 L260,220 Z"
        fill="url(#pat-br)" stroke="#333" stroke-width="1.2"/>
  <!-- EC 27.3% -->
  <path d="M208.30,360.81 A150,150 0 0,1 128.10,148.56 L260,220 Z"
        fill="url(#pat-ec)" stroke="#333" stroke-width="1.2"/>
  <!-- BV 11.1% -->
  <path d="M128.10,148.56 A150,150 0 0,1 204.78,80.53 L260,220 Z"
        fill="url(#pat-bv)" stroke="#333" stroke-width="1.2"/>
  <!-- ER 3.0% -->
  <path d="M204.78,80.53 A150,150 0 0,1 231.89,72.66 L260,220 Z"
        fill="url(#pat-er)" stroke="#333" stroke-width="1.2"/>
  <!-- DP 3.0% -->
  <path d="M231.89,72.66 A150,150 0 0,1 260.00,70.00 L260,220 Z"
        fill="url(#pat-dp)" stroke="#333" stroke-width="1.2"/>

  <!-- Labels on slices -->
  <!-- BR: label at center of slice -->
  <text x="354" y="241" text-anchor="middle" font-size="16" font-weight="bold" fill="white">55.6%</text>
  <text x="354" y="258" text-anchor="middle" font-size="12" fill="white">(55件)</text>

  <!-- EC -->
  <text x="171" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">27.3%</text>
  <text x="171" y="273" text-anchor="middle" font-size="11" fill="#333">(27件)</text>

  <!-- BV - with leader line since slice is smaller -->
  <text x="197" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">11.1%</text>

  <!-- ER and DP - leader lines to external labels -->
  <!-- ER leader -->
  <line x1="233" y1="129" x2="200" y2="60" stroke="#555" stroke-width="0.8"/>
  <text x="198" y="55" text-anchor="end" font-size="11" fill="#333">ER 3.0% (3件)</text>

  <!-- DP leader -->
  <line x1="251" y1="125" x2="270" y2="55" stroke="#555" stroke-width="0.8"/>
  <text x="272" y="55" text-anchor="start" font-size="11" fill="#333">DP 3.0% (3件)</text>

  <!-- Legend -->
  <g transform="translate(445, 100)">
    <rect x="-8" y="-14" width="230" height="180" rx="4" fill="white" stroke="#ccc" stroke-width="0.8"/>
    <text x="0" y="2" font-size="13" font-weight="bold" fill="#222">凡例</text>

    <rect x="0" y="14" width="18" height="14" fill="url(#pat-br)" stroke="#333" stroke-width="0.5"/>
    <text x="24" y="26" font-size="11.5" fill="#222">BR（分岐網羅）</text>
    <text x="24" y="39" font-size="10" fill="#666">55件 (55.6%)</text>

    <rect x="0" y="50" width="18" height="14" fill="url(#pat-ec)" stroke="#333" stroke-width="0.5"/>
    <text x="24" y="62" font-size="11.5" fill="#222">EC（同値クラス）</text>
    <text x="24" y="75" font-size="10" fill="#666">27件 (27.3%)</text>

    <rect x="0" y="86" width="18" height="14" fill="url(#pat-bv)" stroke="#333" stroke-width="0.5"/>
    <text x="24" y="98" font-size="11.5" fill="#222">BV（境界値）</text>
    <text x="24" y="111" font-size="10" fill="#666">11件 (11.1%)</text>

    <rect x="0" y="122" width="18" height="14" fill="url(#pat-er)" stroke="#333" stroke-width="0.5"/>
    <text x="24" y="134" font-size="11.5" fill="#222">ER（エラーパス）</text>
    <text x="24" y="147" font-size="10" fill="#666">3件 (3.0%)</text>

    <rect x="0" y="148" width="18" height="14" fill="url(#pat-dp)" stroke="#333" stroke-width="0.5"/>
    <text x="24" y="160" font-size="11.5" fill="#222">DP（依存切替）</text>

  </g>

  <!-- Footer note -->
  <text x="340" y="415" text-anchor="middle" font-size="11" fill="#888">テスト要求99件の種別分布。分岐網羅(BR)が過半数を占める。</text>
</svg>