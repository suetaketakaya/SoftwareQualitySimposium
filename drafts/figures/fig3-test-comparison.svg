<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440">
  <defs>
    <pattern id="pat-existing" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#888"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#fff" stroke-width="1.5"/>
    </pattern>
    <pattern id="pat-generated" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#444"/>
    </pattern>
  </defs>

  <style>
    text { font-family: "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
  </style>

  <rect width="680" height="440" fill="white"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">図3: 領域別テストケース数の比較</text>

  <!-- Chart area -->
  <!-- X: 90-630, Y: 60-340 -->
  <!-- Y axis -->
  <line x1="90" y1="60" x2="90" y2="340" stroke="#333" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="90" y1="340" x2="630" y2="340" stroke="#333" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="30" y="200" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90, 30, 200)">テストケース数</text>

  <!-- Y gridlines and labels: 0, 10, 20, 30, 40, 50, 60, 70 -->
  <!-- Y range: 340 (0) to 60 (70), scale = 280/70 = 4 px per unit -->
  <line x1="88" y1="340" x2="630" y2="340" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="344" text-anchor="end" font-size="10" fill="#555">0</text>

  <line x1="88" y1="300" x2="630" y2="300" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="304" text-anchor="end" font-size="10" fill="#555">10</text>

  <line x1="88" y1="260" x2="630" y2="260" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="264" text-anchor="end" font-size="10" fill="#555">20</text>

  <line x1="88" y1="220" x2="630" y2="220" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="224" text-anchor="end" font-size="10" fill="#555">30</text>

  <line x1="88" y1="180" x2="630" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="184" text-anchor="end" font-size="10" fill="#555">40</text>

  <line x1="88" y1="140" x2="630" y2="140" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="144" text-anchor="end" font-size="10" fill="#555">50</text>

  <line x1="88" y1="100" x2="630" y2="100" stroke="#ddd" stroke-width="0.5"/>
  <text x="80" y="104" text-anchor="end" font-size="10" fill="#555">60</text>

  <line x1="88" y1="60" x2="630" y2="60" stroke="#eee" stroke-width="0.5"/>
  <text x="80" y="64" text-anchor="end" font-size="10" fill="#555">70</text>

  <!-- Groups: 4 groups, each with 2 bars -->
  <!-- Group width ~130, bar width 45, gap between bars 10 -->
  <!-- Group centers: 160, 290, 420, 550 -->

  <!-- Group 1: format.cpp - existing=15, generated=61 -->
  <g>
    <!-- Existing: 15 => height=15*4=60, y=340-60=280 -->
    <rect x="118" y="280" width="45" height="60" fill="url(#pat-existing)" stroke="#333" stroke-width="0.8"/>
    <text x="140" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">15</text>
    <!-- Generated: 61 => height=61*4=244, y=340-244=96 -->
    <rect x="173" y="96" width="45" height="244" fill="url(#pat-generated)" stroke="#333" stroke-width="0.8"/>
    <text x="195" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">61</text>
    <!-- Ratio -->
    <text x="168" y="80" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">x4.1</text>
    <!-- Label -->
    <text x="168" y="360" text-anchor="middle" font-size="11" fill="#222">format.cpp</text>
  </g>

  <!-- Group 2: CWordParse.cpp - existing=15, generated=53 -->
  <g>
    <rect x="248" y="280" width="45" height="60" fill="url(#pat-existing)" stroke="#333" stroke-width="0.8"/>
    <text x="270" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">15</text>
    <rect x="303" y="128" width="45" height="212" fill="url(#pat-generated)" stroke="#333" stroke-width="0.8"/>
    <text x="325" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">53</text>
    <text x="298" y="112" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">x3.5</text>
    <text x="298" y="360" text-anchor="middle" font-size="10.5" fill="#222">CWordParse.cpp</text>
  </g>

  <!-- Group 3: convert_util.cpp - existing=10, generated=31 -->
  <g>
    <rect x="378" y="300" width="45" height="40" fill="url(#pat-existing)" stroke="#333" stroke-width="0.8"/>
    <text x="400" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">10</text>
    <rect x="433" y="216" width="45" height="124" fill="url(#pat-generated)" stroke="#333" stroke-width="0.8"/>
    <text x="455" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">31</text>
    <text x="428" y="200" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">x3.1</text>
    <text x="428" y="360" text-anchor="middle" font-size="10.5" fill="#222">convert_util.cpp</text>
  </g>

  <!-- Group 4: IsMailAddress - existing=15, generated=27 -->
  <g>
    <rect x="508" y="280" width="45" height="60" fill="url(#pat-existing)" stroke="#333" stroke-width="0.8"/>
    <text x="530" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">15</text>
    <rect x="563" y="232" width="45" height="108" fill="url(#pat-generated)" stroke="#333" stroke-width="0.8"/>
    <text x="585" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">27</text>
    <text x="558" y="216" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">x1.8</text>
    <text x="558" y="360" text-anchor="middle" font-size="10.5" fill="#222">IsMailAddress</text>
  </g>

  <!-- Legend -->
  <g transform="translate(420, 380)">
    <rect x="-8" y="-12" width="220" height="36" rx="3" fill="white" stroke="#ccc" stroke-width="0.8"/>
    <rect x="0" y="-4" width="16" height="12" fill="url(#pat-existing)" stroke="#333" stroke-width="0.5"/>
    <text x="20" y="6" font-size="11" fill="#333">既存テスト</text>
    <rect x="100" y="-4" width="16" height="12" fill="url(#pat-generated)" stroke="#333" stroke-width="0.5"/>
    <text x="120" y="6" font-size="11" fill="#333">生成テスト</text>
  </g>

  <!-- Footnote -->
  <text x="340" y="430" text-anchor="middle" font-size="10" fill="#888">※ 既存テスト数は概算（約45件を領域別に按分）。倍率を赤字で表示。</text>
</svg>