<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460">
  <defs>
    <pattern id="pat-pass" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#606060"/>
    </pattern>
    <pattern id="pat-fail-parse" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#d0d0d0"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#666" stroke-width="2"/>
    </pattern>
    <pattern id="pat-fail-mail" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#eee"/>
      <circle cx="4" cy="4" r="2" fill="#888"/>
    </pattern>
    <pattern id="pat-fail-twochars" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(-45)">
      <rect width="7" height="7" fill="#bbb"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#444" stroke-width="2"/>
    </pattern>
    <pattern id="pat-corrected" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#444"/>
    </pattern>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <style>
    text { font-family: "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
  </style>

  <rect width="680" height="460" fill="white"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">図4: コンパイル・実行結果</text>

  <!-- Chart area: stacked bar + waterfall style -->
  <!-- Three columns: "生成テスト総数", "初回実行結果", "修正後" -->
  <!-- Y scale: 0-150, chart Y: 60-380, scale = 320/150 = 2.133 px per test -->

  <!-- Y axis -->
  <line x1="100" y1="55" x2="100" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="620" y2="380" stroke="#333" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="32" y="218" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90, 32, 218)">テストケース数</text>

  <!-- Y gridlines: 0, 25, 50, 75, 100, 125, 145 -->
  <!-- scale factor: 320/150 = 2.1333 -->
  <line x1="98" y1="380" x2="620" y2="380" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="384" text-anchor="end" font-size="10" fill="#555">0</text>

  <line x1="98" y1="326.67" x2="620" y2="326.67" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="330" text-anchor="end" font-size="10" fill="#555">25</text>

  <line x1="98" y1="273.33" x2="620" y2="273.33" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="277" text-anchor="end" font-size="10" fill="#555">50</text>

  <line x1="98" y1="220" x2="620" y2="220" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="224" text-anchor="end" font-size="10" fill="#555">75</text>

  <line x1="98" y1="166.67" x2="620" y2="166.67" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="170" text-anchor="end" font-size="10" fill="#555">100</text>

  <line x1="98" y1="113.33" x2="620" y2="113.33" stroke="#ddd" stroke-width="0.5"/>
  <text x="90" y="117" text-anchor="end" font-size="10" fill="#555">125</text>

  <line x1="98" y1="70.67" x2="620" y2="70.67" stroke="#eee" stroke-width="0.5"/>
  <text x="90" y="74" text-anchor="end" font-size="10" fill="#555">145</text>

  <!-- Column 1: 生成テスト総数 = 145 -->
  <!-- height = 145 * 2.1333 = 309.33, y = 380 - 309.33 = 70.67 -->
  <rect x="140" y="70.67" width="90" height="309.33" fill="#888" stroke="#333" stroke-width="1"/>
  <text x="185" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">145件</text>
  <text x="185" y="404" text-anchor="middle" font-size="12" fill="#222">生成テスト</text>
  <text x="185" y="418" text-anchor="middle" font-size="12" fill="#222">総数</text>

  <!-- Column 2: 初回実行結果 (stacked) -->
  <!-- PASS: 133, height = 133*2.1333 = 283.73, y = 380-283.73 = 96.27 -->
  <!-- FAIL total: 12, height = 12*2.1333 = 25.6, y = 96.27-25.6 = 70.67 -->
  <!-- FAIL breakdown: ParseVersion=6, IsMailAddress=3, TwoChars=3 -->

  <!-- PASS block -->
  <rect x="300" y="96.27" width="90" height="283.73" fill="url(#pat-pass)" stroke="#333" stroke-width="1"/>
  <text x="345" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="white">PASS</text>
  <text x="345" y="258" text-anchor="middle" font-size="12" fill="white">133件</text>
  <text x="345" y="274" text-anchor="middle" font-size="11" fill="#ccc">(91.7%)</text>

  <!-- FAIL: ParseVersion 6 tests, height=6*2.1333=12.8 -->
  <rect x="300" y="83.47" width="90" height="12.8" fill="url(#pat-fail-parse)" stroke="#333" stroke-width="0.8"/>

  <!-- FAIL: IsMailAddress 3 tests, height=3*2.1333=6.4 -->
  <rect x="300" y="77.07" width="90" height="6.4" fill="url(#pat-fail-mail)" stroke="#333" stroke-width="0.8"/>

  <!-- FAIL: TwoChars 3 tests, height=3*2.1333=6.4 -->
  <rect x="300" y="70.67" width="90" height="6.4" fill="url(#pat-fail-twochars)" stroke="#333" stroke-width="0.8"/>

  <!-- FAIL bracket and label -->
  <line x1="395" y1="70.67" x2="402" y2="70.67" stroke="#555" stroke-width="1"/>
  <line x1="402" y1="70.67" x2="402" y2="96.27" stroke="#555" stroke-width="1"/>
  <line x1="395" y1="96.27" x2="402" y2="96.27" stroke="#555" stroke-width="1"/>

  <!-- FAIL detail labels -->
  <text x="410" y="76" font-size="10" fill="#333" font-weight="bold">FAIL 12件 (8.3%)</text>
  <text x="415" y="88" font-size="9.5" fill="#555">ParseVersion計算ミス: 6件</text>
  <text x="415" y="100" font-size="9.5" fill="#555">IsMailAddress文字数・API: 3件</text>
  <text x="415" y="112" font-size="9.5" fill="#555">WhatKindOfTwoCharsマッピング: 3件</text>

  <text x="345" y="404" text-anchor="middle" font-size="12" fill="#222">初回実行</text>
  <text x="345" y="418" text-anchor="middle" font-size="12" fill="#222">結果</text>

  <!-- Arrow from column 2 to column 3 -->
  <line x1="420" y1="150" x2="470" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="445" y="142" text-anchor="middle" font-size="10" fill="#555">期待値修正</text>

  <!-- Column 3: 修正後 = 145 all PASS -->
  <rect x="480" y="70.67" width="90" height="309.33" fill="url(#pat-corrected)" stroke="#333" stroke-width="1"/>
  <text x="525" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ALL PASS</text>
  <text x="525" y="230" text-anchor="middle" font-size="12" fill="#ccc">145件</text>
  <text x="525" y="248" text-anchor="middle" font-size="11" fill="#ccc">(100%)</text>
  <text x="525" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">145件</text>
  <text x="525" y="404" text-anchor="middle" font-size="12" fill="#222">修正後</text>

  <!-- Legend -->
  <g transform="translate(115, 430)">
    <rect x="-6" y="-12" width="530" height="28" rx="3" fill="white" stroke="#ccc" stroke-width="0.8"/>
    <rect x="2" y="-4" width="14" height="12" fill="url(#pat-pass)" stroke="#333" stroke-width="0.5"/>
    <text x="20" y="6" font-size="10" fill="#333">初回PASS</text>
    <rect x="90" y="-4" width="14" height="12" fill="url(#pat-fail-parse)" stroke="#333" stroke-width="0.5"/>
    <text x="108" y="6" font-size="10" fill="#333">ParseVersion</text>
    <rect x="196" y="-4" width="14" height="12" fill="url(#pat-fail-mail)" stroke="#333" stroke-width="0.5"/>
    <text x="214" y="6" font-size="10" fill="#333">IsMailAddress</text>
    <rect x="304" y="-4" width="14" height="12" fill="url(#pat-fail-twochars)" stroke="#333" stroke-width="0.5"/>
    <text x="322" y="6" font-size="10" fill="#333">TwoChars</text>
    <rect x="398" y="-4" width="14" height="12" fill="url(#pat-corrected)" stroke="#333" stroke-width="0.5"/>
    <text x="416" y="6" font-size="10" fill="#333">修正後PASS</text>
  </g>
</svg>